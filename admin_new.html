<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SODA 后台管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e8e8e8; font-family: sans-serif; min-height: 100vh; }
input, select, textarea { background: #111; border: 1px solid #2a2a30; color: #e8e8e8; border-radius: 4px; padding: 10px 12px; width: 100%; font-size: 14px; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #f0c040; }
button { cursor: pointer; border: none; border-radius: 4px; font-size: 14px; padding: 10px 20px; }
.bp { background: #f0c040; color: #0a0a0f; font-weight: 600; }
.bp:hover { background: #f5d060; }
.bs { background: #2a2a30; color: #e8e8e8; }
.bs:hover { background: #3a3a40; }
.bd { background: #e05050; color: #fff; }
.bd:hover { background: #f06060; }
.login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:#1a1a1f; padding:40px; border-radius:8px; width:90%; max-width:400px; border:1px solid #2a2a30; }
.login-box h1 { margin-bottom:8px; font-size:1.5rem; font-weight:300; }
.login-box p { color:#888; margin-bottom:24px; font-size:14px; }
.login-box input { margin-bottom:16px; }
.login-box button { width:100%; }
#loginError { color:#e05050; font-size:13px; margin-top:12px; min-height:20px; }
.admin-layout { display:none; min-height:100vh; }
.sidebar { width:220px; background:#111; border-right:1px solid #1a1a1f; padding:24px 0; position:fixed; top:0; left:0; height:100vh; }
.sidebar-logo { padding:0 24px 24px; font-size:18px; font-weight:600; letter-spacing:2px; border-bottom:1px solid #1a1a1f; margin-bottom:16px; }
.sidebar-logo span { color:#f0c040; }
.nav-item { padding:12px 24px; color:#888; cursor:pointer; }
.nav-item:hover { color:#e8e8e8; background:#1a1a1f; }
.main-content { margin-left:220px; padding:32px; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
.page-header h2 { font-size:1.4rem; font-weight:300; }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:16px; margin-bottom:32px; }
.stat-card { background:#1a1a1f; border:1px solid #2a2a30; border-radius:8px; padding:20px; }
.stat-card .num { font-size:2rem; font-weight:300; color:#f0c040; }
.stat-card .label { color:#888; font-size:13px; margin-top:4px; }
.works-table { background:#1a1a1f; border-radius:8px; overflow:hidden; border:1px solid #2a2a30; }
.tbl-hdr { display:grid; grid-template-columns:60px 1fr 90px 90px 80px 140px; padding:12px 16px; background:#111; color:#888; font-size:12px; text-transform:uppercase; }
.work-row { display:grid; grid-template-columns:60px 1fr 90px 90px 80px 140px; padding:12px 16px; border-top:1px solid #1a1a1f; align-items:center; }
.work-row:hover { background:#0f0f14; }
.wthumb { width:48px; height:32px; background:#2a2a30; border-radius:4px; overflow:hidden; }
.wthumb video,.wthumb img { width:100%; height:100%; object-fit:cover; }
.wtitle { padding:0 12px; }
.wtitle .t { font-size:14px; margin-bottom:2px; }
.wtitle .s { font-size:11px; color:#888; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; }
.bv { background:#1a3a5c; color:#5aa0d0; }
.bp2 { background:#1a3a2a; color:#5ad080; }
.bpub { background:#1a3a1a; color:#5ad060; }
.bdraft { background:#3a3a1a; color:#d0c060; }
.row-act { display:flex; gap:8px; }
.row-act button { padding:4px 10px; font-size:12px; }
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; align-items:center; justify-content:center; }
.overlay.open { display:flex; }
.panel { background:#1a1a1f; border-radius:8px; width:90%; max-width:560px; max-height:90vh; overflow-y:auto; border:1px solid #2a2a30; }
.panel-hdr { padding:20px 24px; border-bottom:1px solid #2a2a30; display:flex; align-items:center; justify-content:space-between; }
.panel-hdr h3 { font-weight:300; }
.pclose { background:none; color:#888; font-size:20px; padding:0; width:28px; height:28px; }
.pclose:hover { color:#e8e8e8; }
.panel-body { padding:24px; }
.fg { margin-bottom:16px; }
.fg label { display:block; color:#888; font-size:12px; margin-bottom:6px; text-transform:uppercase; }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.upload-area { border:2px dashed #2a2a30; border-radius:8px; padding:32px; text-align:center; cursor:pointer; }
.upload-area:hover { border-color:#f0c040; }
.upload-area input { display:none; }
.prog { height:4px; background:#2a2a30; border-radius:2px; margin-top:8px; overflow:hidden; display:none; }
.prog-fill { height:100%; background:#f0c040; width:0; transition:width .3s; }
.panel-ftr { padding:16px 24px; border-top:1px solid #2a2a30; display:flex; gap:12px; justify-content:flex-end; }
.toast { position:fixed; bottom:24px; right:24px; background:#1a1a1f; border:1px solid #2a2a30; border-radius:8px; padding:14px 20px; font-size:14px; z-index:999; transform:translateY(80px); opacity:0; transition:all .3s; pointer-events:none; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok { border-color:#5ad060; }
.toast.err { border-color:#e05050; }
</style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>SODA <span style="color:#f0c040">Admin</span></h1>
    <p>后台管理系统</p>
    <input type="text" id="loginUser" placeholder="用户名" value="soda" />
    <input type="password" id="loginPass" placeholder="密码" />
    <button class="bp" onclick="login()">登录</button>
    <div id="loginError"></div>
  </div>
</div>
<div class="admin-layout" id="adminLayout">
  <div class="sidebar">
    <div class="sidebar-logo">SODA <span>Admin</span></div>
    <div class="nav-item">📁 作品管理</div>
    <div class="nav-item" onclick="logout()" style="position:absolute;bottom:24px;width:100%">🚪 退出登录</div>
  </div>
  <div class="main-content">
    <div class="page-header">
      <h2>作品管理</h2>
      <div style="display:flex;gap:12px">
        <button class="bs" onclick="loadWorks()">刷新</button>
        <button class="bp" onclick="openAddPanel()">+ 添加作品</button>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="sTotal">-</div><div class="label">总作品</div></div>
      <div class="stat-card"><div class="num" id="sVideo">-</div><div class="label">视频</div></div>
      <div class="stat-card"><div class="num" id="sPhoto">-</div><div class="label">照片</div></div>
      <div class="stat-card"><div class="num" id="sDraft">-</div><div class="label">草稿</div></div>
    </div>
    <div class="works-table">
      <div class="tbl-hdr"><div>封面</div><div>标题</div><div>类型</div><div>状态</div><div>年份</div><div>操作</div></div>
      <div id="worksList"></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-hdr"><h3 id="panelTitle">添加作品</h3><button class="pclose" onclick="closePanel()">✕</button></div>
    <div class="panel-body">
      <input type="hidden" id="editId" />
      <div class="fg"><label>标题</label><input type="text" id="editTitle" placeholder="输入标题" /></div>
      <div class="frow">
        <div class="fg"><label>类型</label><select id="editType"><option value="video">视频</option><option value="photo">照片</option></select></div>
        <div class="fg"><label>年份</label><input type="number" id="editYear" value="2025" /></div>
      </div>
      <div class="fg"><label>状态</label><select id="editStatus"><option value="published">已发布</option><option value="draft">草稿</option></select></div>
      <div class="fg"><label>上传方式</label><select id="uploadMode" onchange="toggleMode()"><option value="url">外链</option><option value="file">本地上传</option></select></div>
      <div id="urlMode" class="fg"><label>外链 URL</label><input type="url" id="editUrl" placeholder="https://..." /></div>
      <div id="fileMode" style="display:none" class="fg">
        <label>上传文件</label>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <div style="color:#888;font-size:14px">点击选择文件<br><small>mp4 mov avi mkv webm jpg png webp</small></div>
          <input type="file" id="fileInput" accept="video/*,image/*" onchange="handleFile(this)" />
          <div id="filePrev"></div>
          <div class="prog" id="prog"><div class="prog-fill" id="progFill"></div></div>
        </div>
      </div>
      <div class="fg"><label>描述</label><textarea id="editDesc" rows="3" placeholder="作品描述..."></textarea></div>
    </div>
    <div class="panel-ftr">
      <button class="bs" onclick="closePanel()">取消</button>
      <button class="bp" onclick="saveWork()">保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = 'https://api.soda567.dpdns.org';
let works = [];
let uploadedFilename = null;

function tok() { return localStorage.getItem('soda_token'); }

async function api(method, path, body, isForm) {
  const opts = { method, headers: {} };
  const t = tok();
  if (t) opts.headers['Authorization'] = 'Bearer ' + t;
  if (body && !isForm) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  if (isForm) opts.body = body;
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); throw new Error('未授权'); }
  return res;
}

async function login() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginError');
  err.textContent = '';
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    if (!res.ok) { err.textContent = '用户名或密码错误'; return; }
    const d = await res.json();
    localStorage.setItem('soda_token', d.token);
    showAdmin();
  } catch(e) { err.textContent = '连接失败: ' + e.message; }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') login();
});

function showAdmin() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminLayout').style.display = 'flex';
  loadWorks();
}

function logout() {
  localStorage.removeItem('soda_token');
  document.getElementById('adminLayout').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

async function loadWorks() {
  document.getElementById('worksList').innerHTML = '<div style="padding:24px;text-align:center;color:#888">加载中...</div>';
  try {
    const res = await api('GET', '/api/works?status=all');
    works = await res.json();
    renderWorks();
    updateStats();
  } catch(e) { toast('加载失败: '+e.message, 'err'); }
}

function updateStats() {
  document.getElementById('sTotal').textContent = works.length;
  document.getElementById('sVideo').textContent = works.filter(w=>w.type==='video').length;
  document.getElementById('sPhoto').textContent = works.filter(w=>w.type==='photo').length;
  document.getElementById('sDraft').textContent = works.filter(w=>w.status==='draft').length;
}

function renderWorks() {
  const list = document.getElementById('worksList');
  if (!works.length) { list.innerHTML = '<div style="padding:32px;text-align:center;color:#888">暂无作品</div>'; return; }
  list.innerHTML = works.map(w => {
    const url = w.source_url || (w.filename ? 'https://media.soda567.dpdns.org/videos/'+w.filename : '');
    const thumb = w.thumbnail ? 'https://media.soda567.dpdns.org/thumbnails/'+w.thumbnail : '';
    const thumbHtml = thumb
      ? '<img src="'+thumb+'" style="width:100%;height:100%;object-fit:cover">'
      : (w.type==='video'&&url ? '<video src="'+url+'" muted preload="metadata" style="width:100%;height:100%;object-fit:cover"></video>' : '');
    return '<div class="work-row">'
      +'<div class="wthumb">'+thumbHtml+'</div>'
      +'<div class="wtitle"><div class="t">'+w.title+'</div><div class="s">'+(url||'无链接')+'</div></div>'
      +'<div><span class="badge '+(w.type==='video'?'bv':'bp2')+'">'+(w.type==='video'?'视频':'照片')+'</span></div>'
      +'<div><span class="badge '+(w.status==='published'?'bpub':'bdraft')+'">'+(w.status==='published'?'已发布':'草稿')+'</span></div>'
      +'<div style="color:#888">'+(w.year||'-')+'</div>'
      +'<div class="row-act">'
        +'<button class="bs" onclick="openEdit(\''+w.id+'\')" style="padding:4px 10px;font-size:12px">编辑</button>'
        +'<button class="bd" onclick="delWork(\''+w.id+'\')" style="padding:4px 10px;font-size:12px">删除</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

function openAddPanel() {
  document.getElementById('panelTitle').textContent = '添加作品';
  document.getElementById('editId').value = '';
  document.getElementById('editTitle').value = '';
  document.getElementById('editType').value = 'video';
  document.getElementById('editYear').value = new Date().getFullYear();
  document.getElementById('editStatus').value = 'published';
  document.getElementById('uploadMode').value = 'url';
  document.getElementById('editUrl').value = '';
  document.getElementById('editDesc').value = '';
  document.getElementById('filePrev').innerHTML = '';
  uploadedFilename = null;
  toggleMode();
  document.getElementById('overlay').classList.add('open');
}

function openEdit(id) {
  const w = works.find(x=>x.id===id);
  if (!w) return;
  document.getElementById('panelTitle').textContent = '编辑作品';
  document.getElementById('editId').value = w.id;
  document.getElementById('editTitle').value = w.title||'';
  document.getElementById('editType').value = w.type||'video';
  document.getElementById('editYear').value = w.year||2025;
  document.getElementById('editStatus').value = w.status||'published';
  document.getElementById('editUrl').value = w.source_url||w.filename||'';
  document.getElementById('editDesc').value = w.description||'';
  document.getElementById('uploadMode').value = 'url';
  toggleMode();
  document.getElementById('overlay').classList.add('open');
}

function closePanel() { document.getElementById('overlay').classList.remove('open'); }

function toggleMode() {
  const m = document.getElementById('uploadMode').value;
  document.getElementById('urlMode').style.display = m==='url'?'block':'none';
  document.getElementById('fileMode').style.display = m==='file'?'block':'none';
}

async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const prev = document.getElementById('filePrev');
  const prog = document.getElementById('prog');
  const fill = document.getElementById('progFill');
  prog.style.display = 'block'; fill.style.width = '10%';
  prev.innerHTML = '';
  try {
    const fd = new FormData();
    fd.append('file', file);
    fill.style.width = '40%';
    const res = await api('POST', '/api/upload', fd, true);
    fill.style.width = '90%';
    if (!res.ok) throw new Error('上传失败');
    const d = await res.json();
    uploadedFilename = d.filename;
    fill.style.width = '100%';
    if (file.type.startsWith('video')) {
      prev.innerHTML = '<video src="https://media.soda567.dpdns.org/videos/'+d.filename+'" controls style="max-width:100%;max-height:160px;margin-top:8px"></video>';
    } else {
      prev.innerHTML = '<img src="https://media.soda567.dpdns.org/photos/'+d.filename+'" style="max-width:100%;max-height:160px;margin-top:8px">';
    }
    toast('上传成功', 'ok');
  } catch(e) { toast('上传失败: '+e.message, 'err'); }
  setTimeout(()=>{ prog.style.display='none'; fill.style.width='0'; }, 1000);
}

async function saveWork() {
  const id = document.getElementById('editId').value;
  const mode = document.getElementById('uploadMode').value;
  const body = {
    title: document.getElementById('editTitle').value.trim(),
    type: document.getElementById('editType').value,
    year: parseInt(document.getElementById('editYear').value)||null,
    status: document.getElementById('editStatus').value,
    description: document.getElementById('editDesc').value.trim()||null,
  };
  if (!body.title) { toast('请输入标题', 'err'); return; }
  if (mode === 'url') {
    body.source_url = document.getElementById('editUrl').value.trim()||null;
  } else {
    if (!uploadedFilename && !id) { toast('请先上传文件', 'err'); return; }
    if (uploadedFilename) body.filename = uploadedFilename;
  }
  try {
    let res;
    if (id) {
      res = await api('PATCH', '/api/works/'+id, body);
    } else {
      res = await api('POST', '/api/works', body);
    }
    if (!res.ok) throw new Error(await res.text());
    toast(id?'更新成功':'添加成功', 'ok');
    closePanel();
    loadWorks();
  } catch(e) { toast('保存失败: '+e.message, 'err'); }
}

async function delWork(id) {
  if (!confirm('确认删除这个作品？')) return;
  try {
    const res = await api('DELETE', '/api/works/'+id);
    if (!res.ok) throw new Error('删除失败');
    toast('已删除', 'ok');
    loadWorks();
  } catch(e) { toast('删除失败: '+e.message, 'err'); }
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type||'');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

// 自动登录
if (tok()) { showAdmin(); } else { document.getElementById('loginPage').style.display='flex'; }
</script>
</body>
</html>
