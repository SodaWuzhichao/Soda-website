<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e8e8e8; font-family: 'DM Sans', -apple-system, sans-serif; font-weight: 200; min-height: 100vh; }
input, select, textarea { background: #111; border: 1px solid #2a2a30; color: #e8e8e8; border-radius: 4px; padding: 10px 12px; width: 100%; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 300; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #f0c040; }
button { cursor: pointer; border: none; border-radius: 4px; font-size: 14px; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-weight: 300; }
.bp { background: #f0c040; color: #0a0a0f; font-weight: 600; }
.bp:hover { background: #f5d060; }
.bs { background: #2a2a30; color: #e8e8e8; }
.bs:hover { background: #3a3a40; }
.bd { background: #ff4d4f; color: #fff; }
.sidebar { width: 240px; background: #000; border-right: 1px solid #1a1a1f; position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 32px 0; }
.logo { padding: 0 32px 48px; font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: 2px; color: #f0c040; }
.nav-item { padding: 12px 32px; cursor: pointer; transition: 0.2s; color: #888; font-size: 15px; }
.nav-item:hover, .nav-item.active { background: #111; color: #f0c040; }
.main { margin-left: 240px; padding: 48px; max-width: 1200px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 48px; }
.stat-card { background: #111; padding: 24px; border-radius: 8px; border: 1px solid #1a1a1f; }
.stat-val { font-size: 32px; font-family: 'Cormorant Garamond', serif; color: #f0c040; }
.stat-label { font-size: 12px; color: #666; text-transform: uppercase; margin-top: 4px; }
.works-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; }
.work-card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #1a1a1f; transition: 0.3s; position: relative; }
.work-card:hover { border-color: #333; transform: translateY(-4px); }
.work-thumb { aspect-ratio: 4/3; background: #000; position: relative; overflow: hidden; }
.work-info { padding: 20px; }
.work-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; margin-bottom: 8px; color: #fff; }
.work-meta { font-size: 12px; color: #666; display: flex; justify-content: space-between; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.overlay.open { display: flex; }
.panel { background: #111; width: 100%; max-width: 600px; border-radius: 12px; border: 1px solid #2a2a30; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; }
.toast { position: fixed; bottom: 32px; right: 32px; padding: 12px 24px; border-radius: 4px; transform: translateY(100px); transition: 0.3s; z-index: 2000; }
.toast.show { transform: translateY(0); }
.toast.ok { background: #5ad060; color: #000; }
.toast.err { background: #ff4d4f; color: #fff; }
.logout-btn { margin-top: auto; padding: 12px 32px; color: #ff4d4f; cursor: pointer; font-size: 14px; opacity: 0.6; }
.logout-btn:hover { opacity: 1; }
.row-checkbox { position: absolute; top: 12px; left: 12px; z-index: 10; cursor: pointer; width: 18px; height: 18px; opacity: 0; transition: 0.2s; }
.work-card:hover .row-checkbox, .row-checkbox:checked { opacity: 1; }
.batch-bar { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: #f0c040; color: #000; padding: 12px 32px; border-radius: 32px; display: flex; align-items: center; gap: 24px; transition: 0.3s; z-index: 900; font-weight: 600; }
.batch-bar.show { transform: translateX(-50%) translateY(0); }
#loginPage { position: fixed; inset: 0; background: #000; z-index: 3000; display: none; align-items: center; justify-content: center; flex-direction: column; }
.login-box { background: #111; padding: 40px; border-radius: 12px; width: 320px; border: 1px solid #1a1a1f; }
</style>
</head>

<script>
const API_WAN = "https://api.soda567.dpdns.org";
const API_LAN = "http://100.73.100.90:5001";
let API = localStorage.getItem("API_MODE") === "WAN" ? API_WAN : API_LAN;

function tok() { return localStorage.getItem('soda_token'); }

function logout() {
  localStorage.removeItem('soda_token');
  location.reload();
}

function toggleApiMode() {
  const btn = document.getElementById('apiModeBtn');
  if (API === API_LAN) {
    API = API_WAN;
    localStorage.setItem("API_MODE", "WAN");
    btn.textContent = "🌐 公网模式";
    btn.style.color = "#f0c040";
  } else {
    API = API_LAN;
    localStorage.setItem("API_MODE", "LAN");
    btn.textContent = "🏠 局域网模式";
    btn.style.color = "#5ad060";
  }
  toast('已切换至' + (API===API_WAN?'公网':'局域网') + '模式', 'ok');
  loadWorks();
}

// 初始化按钮状态
(function(){
  const btn = document.getElementById('apiModeBtn');
  if(API === API_LAN) {
    btn.textContent = "🏠 局域网模式";
    btn.style.color = "#5ad060";
  }
})();

async function login() {
  const u = document.getElementById('user').value;
  const p = document.getElementById('pass').value;
  try {
    const res = await fetch(API+'/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:u, password:p})
    });
    const data = await res.json();
    if (data.token) {
      localStorage.setItem('soda_token', data.token);
      showAdmin();
    } else {
      alert('登录失败');
    }
  } catch(e) {
    alert('网络错误');
  }
}

function showAdmin() {
  document.getElementById('loginPage').style.display='none';
  loadWorks();
}

let works = [];
async function loadWorks() {
  try {
    const res = await fetch(API+'/api/works');
    works = await res.json();
    updateStats();
    renderWorks();
  } catch(e) { console.error(e); }
}

function updateStats() {
  document.getElementById('sTotal').textContent = works.length;
  document.getElementById('sVideo').textContent = works.filter(w=>w.type==='video').length;
  document.getElementById('sPhoto').textContent = works.filter(w=>w.type==='photo').length;
  document.getElementById('sDraft').textContent = works.filter(w=>w.status==='draft').length;
}

function renderWorks() {
  const list = document.getElementById('worksList');
  list.innerHTML = works.map(w => `
    <div class="work-card">
      <input type="checkbox" class="row-checkbox" data-id="${w.id}" onchange="updateBatchBar()">
      <div class="work-thumb">
        <img src="${w.thumbnail?API+'/media/photos/'+w.thumbnail:''}" style="width:100%;height:100%;object-fit:cover">
      </div>
      <div class="work-info">
        <div class="work-title">${w.title}</div>
        <div class="work-meta"><span>${w.type}</span><span>${w.year}</span></div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="bs" style="padding:4px 8px;font-size:11px" onclick="deleteWork('${w.id}')">删除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showPanel() {
  document.getElementById('panelTitle').textContent = '添加作品';
  document.getElementById('overlay').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
}

function toggleMode() {
  const m = document.getElementById('uploadMode').value;
  document.getElementById('fileMode').style.display = m==='file'?'block':'none';
  document.getElementById('urlMode').style.display = m==='url'?'block':'none';
}

let uploadedFilename = null;
async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  
  const prog = document.getElementById('progWrap');
  const fill = document.getElementById('progFill');
  const text = document.getElementById('progText');
  prog.style.display = 'block';

  const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB 分块
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  const identifier = Math.random().toString(36).substring(2);

  for (let i = 0; i < totalChunks; i++) {
    const start = i * CHUNK_SIZE;
    const end = Math.min(file.size, start + CHUNK_SIZE);
    const chunk = file.slice(start, end);

    const fd = new FormData();
    fd.append('chunk', chunk);
    fd.append('filename', file.name);
    fd.append('index', i);
    fd.append('total', totalChunks);
    fd.append('identifier', identifier);

    await fetch(API+'/api/upload_chunk', {
      method: 'POST',
      body: fd
    });
    
    const p = Math.round(((i + 1) / totalChunks) * 100);
    fill.style.width = p + '%';
    text.textContent = '正在上传 ' + p + '%';
  }

  text.textContent = '合并中...';
  const res = await fetch(API+'/api/upload_chunk', {
    method: 'POST',
    body: new URLSearchParams({ 'merge': 'true', 'filename': file.name, 'identifier': identifier })
  });
  const data = await res.json();
  uploadedFilename = data.filename;
  text.textContent = '上传完成';
  toast('作品已同步到服务器', 'ok');
}

async function saveWork() {
  const payload = {
    title: document.getElementById('title').value,
    year: document.getElementById('year').value,
    type: document.getElementById('type').value,
    status: document.getElementById('status').value,
    description: document.getElementById('description').value,
    filename: uploadedFilename || document.getElementById('sourceUrl').value
  };

  await fetch(API+'/api/works', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + tok()
    },
    body: JSON.stringify(payload)
  });
  
  closePanel();
  loadWorks();
  toast('作品保存成功', 'ok');
}

async function deleteWork(id) {
  if(!confirm('确定删除?')) return;
  await fetch(API+'/api/works/'+id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + tok() }
  });
  loadWorks();
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type||'');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

function updateBatchBar() {
  const count = document.querySelectorAll('.row-checkbox:checked').length;
  const bar = document.getElementById('batchBar');
  document.getElementById('batchText').textContent = `已选择 ${count} 项`;
  if (count > 0) bar.classList.add('show');
  else bar.classList.remove('show');
}

if (tok()) { showAdmin(); } else { document.getElementById('loginPage').style.display='flex'; }
</script>
