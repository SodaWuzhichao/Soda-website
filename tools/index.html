<title>在线工具 | SODA567</title>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --gold: #ffd700;
    --text: #e8e8e8; --muted: #666; --border: #222;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 200; }

  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 48px; border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; color: var(--text); text-decoration: none; }
  .nav-back {
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 1px;
    transition: all 0.3s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text);
  }
  .nav-back:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .page-header { padding: 80px 48px 48px; }
  .section-label { font-size: .7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .page-title { font-family: 'DM Sans', sans-serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 200; letter-spacing: -2px; margin-bottom: 16px; }
  .page-desc { color: var(--muted); font-size: .95rem; }

  .tools-container { padding: 0 48px 100px; }

  .category { margin-bottom: 60px; }
  .category-title {
    font-size: .75rem; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }

  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

  .tool-card {
    background: var(--surface); padding: 32px 28px;
    border: 1px solid var(--border); text-decoration: none; display: block;
    transition: border-color .3s, transform .3s; position: relative;
  }
  .tool-card:hover { border-color: var(--gold); transform: translateY(-3px); }
  .tool-card.coming-soon { opacity: .6; cursor: default; }
  .tool-card.coming-soon:hover { transform: none; border-color: var(--border); }

  .tool-icon { font-size: 1.8rem; margin-bottom: 16px; display: block; }
  .tool-icon svg { width: 1.8rem; height: 1.8rem; display: block; }
  .tool-name { font-family: 'DM Sans', sans-serif; font-size: 1.1rem; font-weight: 300; color: var(--text); margin-bottom: 8px; }
  .tool-desc { font-size: .82rem; color: var(--muted); line-height: 1.7; }
  .tool-badge {
    display: inline-block; margin-top: 14px;
    padding: 3px 10px; border: 1px solid var(--border);
    font-size: .68rem; letter-spacing: 1px; color: var(--muted);
  }
  .tool-badge.ready { border-color: var(--gold); color: var(--gold); }

  footer {
    padding: 28px 48px; border-top: 1px solid var(--border);
    font-size: .75rem; color: var(--muted); text-align: center;
  }

  @media (max-width: 768px) {
    nav, .page-header, .tools-container { padding-left: 24px; padding-right: 24px; }
    .tools-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
