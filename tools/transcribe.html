<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频/音频转文案 | SODA567</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --gold: #ffd700;
  --text: #e8e8e8; --muted: #666; --border: #222;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 200; min-height: 100vh; }

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 48px; border-bottom: 1px solid var(--border);
}
.logo { font-size: 1.2rem; color: var(--text); font-weight: 300; text-decoration: none; letter-spacing: 1px; }
.nav-back {
    padding: 10px 20px; border-radius: 6px; text-decoration: none;
    font-size: 0.85rem; font-weight: 300; letter-spacing: 1px;
    transition: all 0.3s; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2); color: var(--text);
  }
  .nav-back:hover { border-color: var(--gold); color: var(--gold); }

.container { max-width: 800px; margin: 0 auto; padding: 80px 48px; }
.page-title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 200; letter-spacing: -2px; margin-bottom: 16px; }
.page-desc { color: var(--muted); font-size: .95rem; margin-bottom: 48px; }

/* 状态指示灯 */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 32px; font-size: 0.85rem;
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #666; transition: background 0.3s;
}
.status-dot.online { background: #5ad060; box-shadow: 0 0 6px rgba(90,208,96,0.5); }
.status-dot.offline { background: #e05050; box-shadow: 0 0 6px rgba(224,80,80,0.5); }
.status-text { color: var(--muted); }
.status-text.online { color: #5ad060; }
.status-text.offline { color: #e05050; }

/* 语言选择 */
.lang-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px; font-size: 0.9rem;
}
.lang-bar label { color: var(--muted); font-size: 0.85rem; }
.lang-select {
  padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 0.85rem;
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  cursor: pointer; transition: border-color 0.3s;
}
.lang-select:hover, .lang-select:focus { border-color: var(--gold); outline: none; }

/* 上传区 */
.upload-area {
  background: var(--surface); border: 2px dashed var(--border);
  border-radius: 8px; padding: 60px 40px; text-align: center;
  cursor: pointer; transition: all .3s;
}
.upload-area:hover { border-color: var(--gold); }
.upload-area.dragover { border-color: var(--gold); background: rgba(255,215,0,0.05); }
.upload-icon { font-size: 3rem; margin-bottom: 16px; }
.upload-text { font-size: 1.1rem; margin-bottom: 8px; }
.upload-hint { font-size: .85rem; color: var(--muted); }

/* 结果区域 */
.result-area { display: none; margin-top: 40px; }
.result-title { font-size: 1.2rem; margin-bottom: 16px; font-weight: 300; }
.result-text {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; line-height: 1.8;
  min-height: 200px; white-space: pre-wrap;
}

/* 按钮组（参考主页风格） */
.btn-group {
  display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap;
}
.btn {
  padding: 14px 28px; border-radius: 6px; text-decoration: none;
  font-weight: 300; font-size: 0.9rem; transition: all 0.3s;
  cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
}
.btn-primary {
  background: var(--gold); color: var(--bg);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255,215,0,0.3);
}
.btn-secondary {
  background: transparent; color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--text);
  transform: translateY(-2px);
}
.btn-ghost {
  background: transparent; color: var(--muted);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-ghost:hover {
  color: var(--text);
  border-color: rgba(255,255,255,0.3);
}

/* 加载 */
.loading { display: none; text-align: center; margin-top: 40px; }
.loading-spinner { border: 3px solid var(--border); border-top: 3px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.progress-container {
  margin-top: 20px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;
}
.progress-bar-bg {
  width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--gold), #ffed4a);
  width: 0%; transition: width 0.3s; border-radius: 5px;
}
.progress-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; font-size: 0.85rem;
}
.progress-pct { color: var(--gold); font-weight: 400; font-size: 1.1rem; }
.progress-phase { color: var(--muted); }

.error { display: none; background: #441111; border: 1px solid #661111; border-radius: 8px; padding: 16px; margin-top: 24px; color: #ff6666; line-height: 1.6; }

@media (max-width: 768px) {
  nav { padding-left: 24px; padding-right: 24px; }
  .container { padding: 60px 24px; }
  .upload-area { padding: 40px 20px; }
  .btn-group { flex-direction: column; }
  .btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo" style="display:flex;align-items:center;gap:8px;text-decoration:none;line-height:1;">
  <img src="../images/logo-icon.png" style="height:52px;width:auto;border-radius:4px;">
  <div style="display:flex;flex-direction:column;justify-content:center;">
    <span style="font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px;color:#fff;font-size:1.2em;">soda</span>
    <span style="font-weight:200;font-family:'DM Sans',sans-serif;letter-spacing:3.5px;font-size:0.65em;opacity:0.8;color:#fff;margin-top:2px;">MEDIA</span>
  </div>
</a>
  <a href="index.html" class="nav-back">返回工具页</a>
</nav>

<div class="container">
  <h1 class="page-title">视频/音频转文案</h1>
  <p class="page-desc">上传视频或音频文件，自动提取文案内容</p>

  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">检测后端服务中...</span>
  </div>

  <!-- 语言选择 -->
  <div class="lang-bar" style="flex-wrap:wrap;row-gap:10px;">
    <label for="langSelect">转写语言</label>
    <select class="lang-select" id="langSelect">
      <option value="zh" selected>中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="auto">自动识别</option>
    </select>

    <label for="modeSelect" style="margin-left:8px;">转写模式</label>
    <select class="lang-select" id="modeSelect">
      <option value="fast">快速</option>
      <option value="balanced" selected>均衡</option>
      <option value="accurate">高精度</option>
    </select>
  </div>

  <div class="lang-bar" style="margin-top:-10px; align-items:flex-start;">
    <label style="display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer;">
      <input type="checkbox" id="vadToggle" style="accent-color: var(--gold); width:16px; height:16px; cursor:pointer;">
      <span>智能识别人声（减少静音干扰）</span>
    </label>
  </div>
  <div class="page-desc" style="font-size:0.82rem;margin:-8px 0 24px 0;">
    适合会议、采访、长录音等停顿较多的内容。普通短口播一般不必开启。
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">🎬</div>
    <div class="upload-text">点击或拖拽文件到这里</div>
    <div class="upload-hint">支持 MP4, MP3, WAV, M4A 等格式</div>
    <input type="file" id="fileInput" accept="video/*,audio/*" style="display:none;">
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div id="loadingText">正在处理中，请稍候...</div>
    <div class="progress-container">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-label">
        <span class="progress-phase" id="progressPhase">准备中</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
    </div>
  </div>

  <div class="error" id="error"></div>

  <div class="result-area" id="resultArea">
    <div class="result-title">提取结果 <span id="wordCount" style="color:var(--muted);font-size:0.9rem;margin-left:12px;"></span></div>
    <div class="result-text" id="resultText"></div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="copyText()">复制文案</button>
      <button class="btn btn-secondary" onclick="downloadText()">导出 TXT</button>
      <button class="btn btn-ghost" onclick="reset()">重新上传</button>
    </div>
  </div>
</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const errorDiv = document.getElementById('error');
const resultArea = document.getElementById('resultArea');
const resultText = document.getElementById('resultText');

const API_BASE = 'https://api.soda567.dpdns.org';

// ===== 服务状态检测 =====
async function checkServiceStatus() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(API_BASE + '/api/health', {
      method: 'GET',
      signal: controller.signal,
      mode: 'cors'
    });
    clearTimeout(timeoutId);
    const data = await res.json();
    if (data.status === 'ok') {
      dot.className = 'status-dot online';
      text.className = 'status-text online';
      text.textContent = '后端服务正常运行';
      return true;
    }
  } catch (e) {
    console.error('健康检查失败:', e);
  }
  dot.className = 'status-dot offline';
  text.className = 'status-text offline';
  text.textContent = '后端服务不可用，请联系管理员';
  return false;
}
checkServiceStatus();
setInterval(checkServiceStatus, 30000);

// ===== 上传逻辑 =====
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', handleFile);

uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    fileInput.files = e.dataTransfer.files;
    handleFile();
  }
});

function setProgress(pct, phase) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  if (phase) document.getElementById('progressPhase').textContent = phase;
}

function showError(msg) {
  loading.style.display = 'none';
  errorDiv.style.display = 'block';
  errorDiv.innerHTML = String(msg).replace(/\n/g, '<br>');
  uploadArea.style.display = 'block';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/1024/1024).toFixed(1) + 'MB';
}

function getSafeAudioContext(sampleRate) {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) throw new Error('当前浏览器不支持音频处理');
  return sampleRate ? new AudioCtx({ sampleRate }) : new AudioCtx();
}

function replaceExtension(filename, ext) {
  const base = (filename || 'media').replace(/\.[^.]+$/, '');
  return `${base}${ext}`;
}

function getFileExtension(filename) {
  const match = (filename || '').match(/\.([^.]+)$/);
  return match ? match[1].toLowerCase() : '';
}

function isVideoFile(file) {
  const type = (file.type || '').toLowerCase();
  if (type.startsWith('video/')) return true;
  return ['mp4', 'mov', 'm4v', 'webm', 'mkv', 'avi'].includes(getFileExtension(file.name));
}

function isIOSLike() {
  const ua = navigator.userAgent || '';
  return /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function isSafariLike() {
  const ua = navigator.userAgent || '';
  return /Safari/i.test(ua) && !/Chrome|CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo/i.test(ua);
}

function isFeishuBrowser() {
  const ua = navigator.userAgent || '';
  return /Lark|Feishu/i.test(ua);
}

function isIOSFeishuWebView() {
  return isFeishuBrowser() && isIOSLike();
}

function getEnvironmentWarning(file) {
  // 飞书浏览器限制已解除，正常允许上传
  return '';
}

function getFriendlyNetworkError(context) {
  return context === 'upload'
    ? '网络错误，请检查网络连接后重试'
    : '获取转写进度失败，请检查网络后重试';
}

function supportsMediaElementExtraction() {
  return typeof MediaRecorder !== 'undefined';
}

async function preprocessMedia(file) {
  // iPhone / 手机上不尝试前端抽音轨，直接传原文件让后端处理
  if (isIOSLike() && isVideoFile(file)) {
    console.log('iPhone 视频：直接上传，由后端提取音轨');
    return file;
  }
  if (isVideoFile(file)) {
    return prepareVideoAudio(file);
  }
  return compressAudio(file);
}

async function prepareVideoAudio(file) {
  try {
    return await decodeMediaFileToWav(file, {
      startPct: 4,
      endPct: 18,
      startLabel: '提取视频音轨中...',
      endLabel: '音轨已整理完成'
    });
  } catch (decodeError) {
    console.warn('直接解码视频音轨失败:', decodeError);

    if (isIOSLike() || isSafariLike()) {
      throw new Error('当前 iPhone / Safari 无法稳定提取这个视频的音轨。为避免直接上传原视频，请先在相册或剪映里导出成音频（m4a/mp3）后再上传，或改用桌面端 Chrome 重试。');
    }

    if (!supportsMediaElementExtraction()) {
      throw new Error('当前浏览器不支持前端提取视频音轨。请先把视频导出成音频后再上传，或换桌面端 Chrome / Safari 最新版重试。');
    }

    const extractedAudio = await extractAudioFromVideo(file);
    return decodeMediaFileToWav(extractedAudio, {
      startPct: 12,
      endPct: 18,
      startLabel: '整理提取出的音轨...',
      endLabel: '音轨已整理完成'
    });
  }
}

// ===== 音频压缩 / 视频抽音轨 =====
async function compressAudio(file) {
  if (file.size < 5 * 1024 * 1024) {
    console.log('文件较小，跳过压缩:', formatSize(file.size));
    return file;
  }

  console.log('开始压缩音频:', formatSize(file.size));
  return decodeMediaFileToWav(file, {
    startPct: 8,
    endPct: 15,
    startLabel: '压缩音频中...',
    endLabel: '音频已准备完成',
    fallbackToOriginal: true
  });
}

async function decodeMediaFileToWav(file, options = {}) {
  const {
    startPct = 8,
    endPct = 15,
    startLabel = '处理中...',
    endLabel = '处理完成',
    fallbackToOriginal = false
  } = options;

  let audioCtx;
  try {
    setProgress(startPct, startLabel);
    audioCtx = getSafeAudioContext(16000);
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const arrayBuffer = await file.arrayBuffer();
    setProgress(startPct + Math.max(1, (endPct - startPct) * 0.25), startLabel);

    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    setProgress(startPct + Math.max(2, (endPct - startPct) * 0.65), '正在转换为轻量音频...');

    const monoData = mixToMono(audioBuffer);
    const wavBlob = encodeWAV(monoData, 16000);
    const outputFile = new File([wavBlob], replaceExtension(file.name || 'audio', '.wav'), { type: 'audio/wav' });

    console.log('音频整理完成:', formatSize(file.size), '→', formatSize(outputFile.size));
    setProgress(endPct, `${endLabel}（${formatSize(outputFile.size)}）`);
    return outputFile;
  } catch (e) {
    console.warn('音频处理失败:', e);
    if (fallbackToOriginal) {
      return file;
    }
    throw e;
  } finally {
    if (audioCtx && audioCtx.state !== 'closed') {
      await audioCtx.close().catch(() => {});
    }
  }
}

function mixToMono(audioBuffer) {
  const { numberOfChannels, length } = audioBuffer;
  if (numberOfChannels === 1) return audioBuffer.getChannelData(0);

  const mono = new Float32Array(length);
  for (let ch = 0; ch < numberOfChannels; ch++) {
    const channel = audioBuffer.getChannelData(ch);
    for (let i = 0; i < length; i++) mono[i] += channel[i] / numberOfChannels;
  }
  return mono;
}

async function extractAudioFromVideo(file) {
  const hasAudioContext = !!(window.AudioContext || window.webkitAudioContext);
  const hasMediaRecorder = typeof MediaRecorder !== 'undefined';
  if (!hasAudioContext || !hasMediaRecorder) {
    throw new Error('当前浏览器不支持前端提取视频音轨（缺少 Web Audio 或 MediaRecorder）。请改用最新版 Safari / Chrome，或先把视频导出成音频后再上传。');
  }

  const mimeType = getSupportedRecorderMimeType();
  console.log('开始前端提取视频音轨:', file.name, formatSize(file.size), mimeType || 'browser-default');
  setProgress(3, '正在提取视频音轨...');

  const objectUrl = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.src = objectUrl;
  video.preload = 'auto';
  video.muted = true;
  video.playsInline = true;
  video.crossOrigin = 'anonymous';
  video.style.position = 'fixed';
  video.style.left = '-9999px';
  video.style.width = '1px';
  video.style.height = '1px';
  document.body.appendChild(video);

  let audioCtx;
  let recorder;
  try {
    await waitForMediaReady(video);
    audioCtx = getSafeAudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    const source = audioCtx.createMediaElementSource(video);
    const destination = audioCtx.createMediaStreamDestination();
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;

    source.connect(destination);
    source.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    const chunks = [];
    recorder = new MediaRecorder(destination.stream, mimeType ? { mimeType } : undefined);

    const extractedBlob = await new Promise((resolve, reject) => {
      recorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) chunks.push(event.data);
      };
      recorder.onerror = (event) => reject(event.error || new Error('录制视频音轨失败'));
      recorder.onstop = () => {
        const recordedType = chunks[0]?.type || mimeType || 'audio/webm';
        resolve(new Blob(chunks, { type: recordedType }));
      };
      video.onerror = () => reject(new Error('视频加载失败，无法提取音轨'));
      video.ontimeupdate = () => {
        if (!video.duration || !isFinite(video.duration)) return;
        const ratio = Math.min(video.currentTime / video.duration, 1);
        setProgress(3 + ratio * 7, `提取视频音轨中 ${Math.round(ratio * 100)}%`);
      };
      video.onended = () => {
        if (recorder.state !== 'inactive') recorder.stop();
      };

      recorder.start(1000);
      const playPromise = video.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => reject(new Error('当前浏览器阻止了视频自动播放，无法提取音轨。请改用音频文件上传，或换 Chrome / Safari 最新版重试。')));
      }
    });

    console.log('视频音轨提取完成:', formatSize(extractedBlob.size));
    return new File([extractedBlob], replaceExtension(file.name, '.audio.webm'), { type: extractedBlob.type || 'audio/webm' });
  } catch (e) {
    console.warn('视频音轨提取失败:', e);
    throw e;
  } finally {
    try { video.pause(); } catch (_) {}
    video.removeAttribute('src');
    video.load();
    video.remove();
    URL.revokeObjectURL(objectUrl);
    if (recorder && recorder.state !== 'inactive') {
      try { recorder.stop(); } catch (_) {}
    }
    if (audioCtx && audioCtx.state !== 'closed') {
      await audioCtx.close().catch(() => {});
    }
  }
}

function waitForMediaReady(mediaEl) {
  return new Promise((resolve, reject) => {
    const cleanup = () => {
      mediaEl.onloadedmetadata = null;
      mediaEl.oncanplay = null;
      mediaEl.onerror = null;
    };
    mediaEl.onloadedmetadata = () => {
      if (mediaEl.readyState >= 2) {
        cleanup();
        resolve();
      }
    };
    mediaEl.oncanplay = () => {
      cleanup();
      resolve();
    };
    mediaEl.onerror = () => {
      cleanup();
      reject(new Error('视频解析失败，可能是不支持的编码格式'));
    };
  });
}

function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);
  let offset = 44;
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}

const TRANSCRIBE_CHUNK_SIZE = 512 * 1024;
const TRANSCRIBE_MAX_RETRIES = 3;
const TRANSCRIBE_STATUS_POLL_MS = 2000;

function getResumeKey(file) {
  return `transcribe_resume:${file.name}:${file.size}:${file.lastModified}`;
}

async function handleFile() {
  const file = fileInput.files[0];
  if (!file) return;

  const envWarning = getEnvironmentWarning(file);
  if (envWarning) {
    showError('⚠️ ' + envWarning);
    fileInput.value = '';
    return;
  }

  uploadArea.style.display = 'none';
  loading.style.display = 'block';
  errorDiv.style.display = 'none';
  resultArea.style.display = 'none';
  setProgress(0, '准备上传');

  try {
    const uploadFile = await preprocessMedia(file);
    const lang = document.getElementById('langSelect').value;
    const mode = document.getElementById('modeSelect').value;
    const vadEnabled = document.getElementById('vadToggle').checked;
    const result = await uploadFileToServer(uploadFile, uploadFile.name || file.name, lang, mode, vadEnabled);

    setProgress(100, '完成!');
    loading.style.display = 'none';
    resultArea.style.display = 'block';
    resultText.textContent = result || '（未能提取到文案）';
    document.getElementById('wordCount').textContent = `共 ${resultText.textContent.length} 字`;

  } catch (err) {
    console.error('处理失败:', err);
    showError('❌ 处理失败：' + err.message);
  }
}

async function uploadChunkToServer(file, fileId, idx, totalParts, onProgress) {
  const start = idx * TRANSCRIBE_CHUNK_SIZE;
  const end = Math.min(file.size, start + TRANSCRIBE_CHUNK_SIZE);
  const chunk = file.slice(start, end);
  const formData = new FormData();
  formData.append('file', chunk, `${file.name}.part${idx}`);
  formData.append('file_id', fileId);
  formData.append('part_index', String(idx));
  formData.append('total_parts', String(totalParts));
  formData.append('filename', file.name);

  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
      if (!e.lengthComputable || !onProgress) return;
      onProgress({ loaded: e.loaded, total: e.total, idx, totalParts, start, end });
    };
    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText || '{}');
        if (xhr.status >= 200 && xhr.status < 300 && data.status === 'ok') {
          resolve({ start, end, data });
        } else {
          reject(new Error(data.message || data.error || `分片 ${idx + 1} 上传失败`));
        }
      } catch (e) {
        reject(new Error(`分片 ${idx + 1} 响应解析失败`));
      }
    };
    xhr.onerror = () => reject(new Error(`分片 ${idx + 1} 网络错误`));
    xhr.ontimeout = () => reject(new Error(`分片 ${idx + 1} 上传超时`));
    xhr.timeout = 600000;
    xhr.open('POST', API_BASE + '/api/transcribe/upload_chunk');
    xhr.send(formData);
  });
}

async function completeChunkUpload(file, fileId, lang, mode, vadEnabled) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText || '{}');
        if (xhr.status >= 200 && xhr.status < 300 && data.task_id) {
          resolve(data);
        } else {
          reject(new Error(data.error || 'complete 未返回 task_id'));
        }
      } catch (e) {
        reject(new Error('complete 响应解析失败'));
      }
    };
    xhr.onerror = () => reject(new Error('complete 网络错误'));
    xhr.ontimeout = () => reject(new Error('complete 超时'));
    xhr.timeout = 600000;
    xhr.open('POST', API_BASE + '/api/transcribe/complete');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify({
      file_id: fileId,
      filename: file.name,
      content_type: file.type || '',
      language: lang,
      mode,
      vad: vadEnabled,
    }));
  });
}

async function uploadFileToServer(file, originalName, lang, mode, vadEnabled) {
  const fileSizeMB = (file.size / 1024 / 1024).toFixed(1);
  const totalParts = Math.max(1, Math.ceil(file.size / TRANSCRIBE_CHUNK_SIZE));
  const resumeKey = getResumeKey(file);
  let resume = null;
  try {
    resume = JSON.parse(localStorage.getItem(resumeKey) || 'null');
  } catch (_) {}

  const fileId = resume?.fileId || (`web_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`);
  let nextIndex = Number.isInteger(resume?.nextIndex) ? resume.nextIndex : 0;
  console.log('开始分片上传:', API_BASE, '文件:', originalName, '大小:', fileSizeMB + 'MB', '语言:', lang, '模式:', mode, 'VAD:', vadEnabled, '分片数:', totalParts);

  for (let i = nextIndex; i < totalParts; i++) {
    let lastErr = null;
    for (let attempt = 1; attempt <= TRANSCRIBE_MAX_RETRIES; attempt++) {
      try {
        await uploadChunkToServer(file, fileId, i, totalParts, ({ loaded, idx, totalParts: allParts }) => {
          const uploadedBefore = idx * TRANSCRIBE_CHUNK_SIZE;
          const overallLoaded = Math.min(file.size, uploadedBefore + loaded);
          const pct = (overallLoaded / file.size) * 60;
          const loadedMB = (overallLoaded / 1024 / 1024).toFixed(1);
          setProgress(pct, `上传中 ${loadedMB}/${fileSizeMB}MB（第 ${idx + 1}/${allParts} 片，尝试 ${attempt}/${TRANSCRIBE_MAX_RETRIES}）`);
        });
        localStorage.setItem(resumeKey, JSON.stringify({ fileId, nextIndex: i + 1 }));
        setProgress(((i + 1) / totalParts) * 60, `已上传 ${i + 1}/${totalParts} 片`);
        lastErr = null;
        break;
      } catch (err) {
        lastErr = err;
        console.warn(`分片 ${i + 1}/${totalParts} 第 ${attempt}/${TRANSCRIBE_MAX_RETRIES} 次失败`, err);
        if (attempt < TRANSCRIBE_MAX_RETRIES) {
          await new Promise(r => setTimeout(r, attempt * 1500));
        }
      }
    }
    if (lastErr) {
      throw lastErr;
    }
  }

  setProgress(65, '上传完成，服务端合并中...');
  const completeData = await completeChunkUpload(file, fileId, lang, mode, vadEnabled);
  localStorage.removeItem(resumeKey);
  setProgress(72, '后台任务已创建，开始轮询...');
  return await pollUntilDone(completeData.task_id);
}

function estimateQueuedProgress(elapsedSec, queuePos) {
  const queueBoost = queuePos > 0 ? Math.min(10, queuePos * 1.5) : 4;
  return Math.min(90, 72 + queueBoost + elapsedSec * 0.5);
}

function estimateProcessingProgress(elapsedSec, currentPct) {
  const timeBased = 84 + elapsedSec * 0.35;
  const stepped = currentPct + 2.2;
  return Math.min(97, Math.max(timeBased, stepped));
}

async function fetchTaskStatus(taskId) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText || '{}');
        if ((xhr.status >= 200 && xhr.status < 300) || data.status === 'error') {
          resolve(data);
        } else {
          reject(new Error(data.error || '状态查询失败'));
        }
      } catch (e) {
        reject(new Error('状态响应解析失败'));
      }
    };
    xhr.onerror = () => reject(new Error(getFriendlyNetworkError('poll')));
    xhr.ontimeout = () => reject(new Error('状态查询超时'));
    xhr.timeout = 30000;
    xhr.open('GET', API_BASE + '/api/status/' + encodeURIComponent(taskId));
    xhr.send();
  });
}

async function pollUntilDone(taskId) {
  const maxWait = 600;
  const startTime = Date.now();
  let visualPct = 72;

  while (true) {
    if (Date.now() - startTime > maxWait * 1000) {
      throw new Error('转写超时（超过10分钟），请重试');
    }

    await new Promise(r => setTimeout(r, TRANSCRIBE_STATUS_POLL_MS));

    try {
      const data = await fetchTaskStatus(taskId);
      const elapsed = (Date.now() - startTime) / 1000;

      if (data.status === 'completed') {
        setProgress(100, '转写完成');
        return data.result || '';
      } else if (data.status === 'error') {
        throw new Error(data.error || '转写失败');
      } else if (data.phase === 'preprocessing') {
        visualPct = Math.max(78, visualPct);
        setProgress(visualPct, '媒体预处理中...');
      } else if (data.phase === 'submitting') {
        visualPct = Math.max(84, visualPct);
        setProgress(visualPct, '正在提交到转写队列...');
      } else if (data.phase === 'transcribing' || data.status === 'processing') {
        visualPct = estimateProcessingProgress(elapsed, visualPct);
        setProgress(visualPct, '转写中，正在持续生成文案...');
      } else {
        const queuePos = data.queue_position || 0;
        visualPct = Math.max(visualPct, estimateQueuedProgress(elapsed, queuePos));
        setProgress(visualPct, queuePos > 0 ? `排队中（前面还有 ${queuePos} 个任务）` : '任务已提交，服务端正在准备转写...');
      }
    } catch (e) {
      if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('网络错误')) {
        if (isIOSFeishuWebView()) {
          throw new Error(getFriendlyNetworkError('poll'));
        }
        continue;
      }
      throw e;
    }
  }
}

function copyText() {
  navigator.clipboard.writeText(resultText.textContent);
  alert('✅ 文案已复制到剪贴板！');
}

function downloadText() {
  const blob = new Blob([resultText.textContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `文案_${new Date().getTime()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function reset() {
  uploadArea.style.display = 'block';
  resultArea.style.display = 'none';
  fileInput.value = '';
}
