<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频/音频转文案 | SODA567</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --gold: #ffd700;
  --text: #e8e8e8; --muted: #666; --border: #222;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 200; min-height: 100vh; }

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 48px; border-bottom: 1px solid var(--border);
}
.logo { font-size: 1.2rem; color: var(--text); font-weight: 300; text-decoration: none; letter-spacing: 1px; }
.nav-back {
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 1px;
    transition: all 0.3s;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text);
  }
  .nav-back:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

.container { max-width: 800px; margin: 0 auto; padding: 80px 48px; }
.page-title { font-size: clamp(2rem, 4vw, 3rem); font-weight: 200; letter-spacing: -2px; margin-bottom: 16px; }
.page-desc { color: var(--muted); font-size: .95rem; margin-bottom: 48px; }

/* 服务状态指示灯 */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 32px; font-size: 0.85rem;
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #666; transition: background 0.3s;
}
.status-dot.online { background: #5ad060; box-shadow: 0 0 6px rgba(90,208,96,0.5); }
.status-dot.offline { background: #e05050; box-shadow: 0 0 6px rgba(224,80,80,0.5); }
.status-text { color: var(--muted); }
.status-text.online { color: #5ad060; }
.status-text.offline { color: #e05050; }

.upload-area {
  background: var(--surface); border: 2px dashed var(--border);
  border-radius: 8px; padding: 60px 40px; text-align: center;
  cursor: pointer; transition: all .3s;
}
.upload-area:hover { border-color: var(--gold); }
.upload-area.dragover { border-color: var(--gold); background: rgba(255,215,0,0.05); }
.upload-icon { font-size: 3rem; margin-bottom: 16px; }
.upload-text { font-size: 1.1rem; margin-bottom: 8px; }
.upload-hint { font-size: .85rem; color: var(--muted); }

.result-area { display: none; margin-top: 40px; }
.result-title { font-size: 1.2rem; margin-bottom: 16px; font-weight: 300; }
.result-text {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px; line-height: 1.8;
  min-height: 200px; white-space: pre-wrap;
}
.btn { padding: 12px 28px; background: var(--gold); color: var(--bg); border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: background .3s; margin-top: 16px; }
.btn:hover { background: #f5d060; }

.loading { display: none; text-align: center; margin-top: 40px; }
.loading-spinner { border: 3px solid var(--border); border-top: 3px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 16px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.progress-container {
  margin-top: 20px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto;
}
.progress-bar-bg {
  width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--gold), #ffed4a);
  width: 0%; transition: width 0.3s; border-radius: 5px;
}
.progress-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; font-size: 0.85rem;
}
.progress-pct { color: var(--gold); font-weight: 400; font-size: 1.1rem; }
.progress-phase { color: var(--muted); }

.error { display: none; background: #441111; border: 1px solid #661111; border-radius: 8px; padding: 16px; margin-top: 24px; color: #ff6666; }

@media (max-width: 768px) {
  nav { padding-left: 24px; padding-right: 24px; }
  .container { padding: 60px 24px; }
  .upload-area { padding: 40px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo" style="display:flex;align-items:center;gap:8px;text-decoration:none;line-height:1;">
  <img src="../images/logo-icon.png" style="height:52px;width:auto;border-radius:4px;">
  <div style="display:flex;flex-direction:column;justify-content:center;">
    <span style="font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px;color:#fff;font-size:1.2em;">soda</span>
    <span style="font-weight:200;font-family:'DM Sans',sans-serif;letter-spacing:3.5px;font-size:0.65em;opacity:0.8;color:#fff;margin-top:2px;">MEDIA</span>
  </div>
</a>
  <a href="index.html" class="nav-back">返回工具页</a>
</nav>

<div class="container">
  <h1 class="page-title">视频/音频转文案</h1>
  <p class="page-desc">上传视频或音频文件，自动提取文案内容</p>

  <!-- 服务状态指示灯 -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">检测后端服务中...</span>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">🎬</div>
    <div class="upload-text">点击或拖拽文件到这里</div>
    <div class="upload-hint">支持 MP4, MP3, WAV, M4A 等格式</div>
    <input type="file" id="fileInput" accept="video/*,audio/*" style="display:none;">
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div id="loadingText">正在处理中，请稍候...</div>
    <div class="progress-container">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-label">
        <span class="progress-phase" id="progressPhase">准备中</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
    </div>
  </div>

  <div class="error" id="error"></div>

  <div class="result-area" id="resultArea">
    <div class="result-title">提取结果 <span id="wordCount" style="color:var(--muted);font-size:0.9rem;margin-left:12px;"></span></div>
    <div class="result-text" id="resultText"></div>
    <button class="btn" onclick="copyText()">复制文案</button>
    <button class="btn" onclick="downloadText()" style="background:#2a2a30;margin-left:12px;">导出TXT</button>
    <button class="btn" onclick="reset()" style="background:#2a2a30;margin-left:12px;">重新上传</button>
  </div>
</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const error = document.getElementById('error');
const resultArea = document.getElementById('resultArea');
const resultText = document.getElementById('resultText');

const API_BASE = 'https://api.soda567.dpdns.org';

// ===== 服务状态检测 =====
async function checkServiceStatus() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const res = await fetch(API_BASE + '/api/health', { method: 'GET', signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    if (data.status === 'ok') {
      dot.className = 'status-dot online';
      text.className = 'status-text online';
      text.textContent = '后端服务正常运行';
      return true;
    }
  } catch (e) {}
  dot.className = 'status-dot offline';
  text.className = 'status-text offline';
  text.textContent = '后端服务不可用，请联系管理员';
  return false;
}
checkServiceStatus();
// 每30秒检测一次
setInterval(checkServiceStatus, 30000);

// ===== 上传逻辑 =====
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', handleFile);

// 拖拽上传
uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length) {
    fileInput.files = e.dataTransfer.files;
    handleFile();
  }
});

function setProgress(pct, phase) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = Math.round(pct) + '%';
  if (phase) document.getElementById('progressPhase').textContent = phase;
}

async function handleFile() {
  const file = fileInput.files[0];
  if (!file) return;

  // 先检查服务状态
  const serviceOk = await checkServiceStatus();
  if (!serviceOk) {
    error.style.display = 'block';
    error.textContent = '❌ 后端服务不可用，请稍后再试或联系管理员';
    return;
  }

  // 隐藏上传区域，显示加载
  uploadArea.style.display = 'none';
  loading.style.display = 'block';
  error.style.display = 'none';
  resultArea.style.display = 'none';
  setProgress(0, '准备上传');

  try {
    // ===== 阶段1：上传文件（带进度） =====
    const taskId = await uploadWithProgress(file);

    // ===== 阶段2：轮询转写状态 =====
    setProgress(30, '已提交，等待转写...');
    const result = await pollUntilDone(taskId);

    // ===== 阶段3：显示结果 =====
    setProgress(100, '完成!');
    loading.style.display = 'none';
    resultArea.style.display = 'block';
    resultText.textContent = result || '（未能提取到文案）';
    document.getElementById('wordCount').textContent = `共 ${resultText.textContent.length} 字`;

  } catch (err) {
    loading.style.display = 'none';
    error.style.display = 'block';
    error.textContent = '❌ 处理失败：' + err.message;
    uploadArea.style.display = 'block';
  }
}

function uploadWithProgress(file) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const formData = new FormData();
    formData.append('file', file);

    // 上传进度追踪
    xhr.upload.onprogress = (e) => {
      if (!e.lengthComputable) return;
      const uploadPct = (e.loaded / e.total) * 30; // 上传占 0-30%
      setProgress(uploadPct, `上传中 ${Math.round(e.loaded / 1024 / 1024)}MB / ${Math.round(e.total / 1024 / 1024)}MB`);
    };

    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          const data = JSON.parse(xhr.responseText);
          const taskId = data.task_id;
          if (!taskId) {
            reject(new Error('服务返回数据异常：缺少 task_id'));
            return;
          }
          setProgress(30, '上传完成');
          resolve(taskId);
        } catch (e) {
          reject(new Error('解析服务响应失败'));
        }
      } else {
        try {
          const errData = JSON.parse(xhr.responseText);
          reject(new Error(errData.error || '上传失败，状态码: ' + xhr.status));
        } catch (e) {
          reject(new Error('上传失败，状态码: ' + xhr.status));
        }
      }
    };

    xhr.onerror = () => reject(new Error('网络错误，请检查网络连接'));
    xhr.ontimeout = () => reject(new Error('上传超时，请重试'));
    xhr.timeout = 300000; // 5分钟超时

    xhr.open('POST', API_BASE + '/api/transcribe');
    xhr.send(formData);
  });
}

async function pollUntilDone(taskId) {
  const maxWait = 600; // 最多等10分钟
  const startTime = Date.now();

  while (true) {
    if (Date.now() - startTime > maxWait * 1000) {
      throw new Error('转写超时（超过10分钟），请重试');
    }

    await new Promise(r => setTimeout(r, 2000)); // 每2秒查一次

    const res = await fetch(API_BASE + '/api/status/' + taskId);
    if (!res.ok) throw new Error('查询转写状态失败');

    const data = await res.json();
    const status = data.status;

    if (status === 'completed') {
      setProgress(100, '转写完成');
      return data.result || '';
    } else if (status === 'error') {
      throw new Error(data.error || '转写失败');
    } else if (status === 'processing') {
      // 转写中：30% - 95%
      const elapsed = (Date.now() - startTime) / 1000;
      const estimated = Math.min(95, 30 + (elapsed / 300) * 65); // 假设5分钟完成
      setProgress(estimated, '转写中，请耐心等待...');
    } else {
      // pending
      const queuePos = data.queue_position || 0;
      setProgress(30, queuePos > 0 ? `排队中（第${queuePos}位）` : '等待转写开始...');
    }
  }
}

function copyText() {
  navigator.clipboard.writeText(resultText.textContent);
  alert('✅ 文案已复制到剪贴板！');
}

function downloadText() {
  const blob = new Blob([resultText.textContent], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `文案_${new Date().getTime()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function reset() {
  uploadArea.style.display = 'block';
  resultArea.style.display = 'none';
  fileInput.value = '';
}
</script>

</body>
</html>
