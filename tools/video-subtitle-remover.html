<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频去字幕 | SODA567</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎞️</text></svg>">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#0a0a0a; --surface:#141414; --gold:#ffd700;
  --text:#e8e8e8; --muted:#666; --border:#222;
  --ok:#5ad060; --warn:#f0c46a; --danger:#ff6666;
}
html { color-scheme: dark; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:200; min-height:100vh; }
nav { display:flex; justify-content:space-between; align-items:center; padding:24px 48px; border-bottom:1px solid var(--border); }
.logo { font-size:1.2rem; color:var(--text); font-weight:300; text-decoration:none; letter-spacing:1px; }
.nav-back { padding:10px 20px; border-radius:6px; text-decoration:none; font-size:.85rem; font-weight:300; letter-spacing:1px; transition:all .3s; border:1px solid rgba(255,255,255,.2); color:var(--text); }
.nav-back:hover { border-color:var(--gold); color:var(--gold); }
.container { max-width:860px; margin:0 auto; padding:80px 48px; }
.page-title { font-size:clamp(2rem,4vw,3rem); font-weight:200; letter-spacing:-2px; margin-bottom:16px; }
.page-desc { color:var(--muted); font-size:.95rem; margin-bottom:36px; line-height:1.8; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:24px; margin-top:24px; }
.upload-area { background:var(--surface); border:2px dashed var(--border); border-radius:8px; padding:54px 32px; text-align:center; cursor:pointer; transition:all .3s; }
.upload-area:hover,.upload-area.dragover { border-color:var(--gold); background:rgba(255,215,0,.05); }
.upload-icon { font-size:3rem; margin-bottom:16px; }
.upload-text { font-size:1.1rem; margin-bottom:8px; }
.upload-hint,.help { font-size:.85rem; color:var(--muted); line-height:1.7; }
.file-name { margin-top:14px; color:var(--gold); font-size:.86rem; word-break:break-all; }
.field { margin-bottom:18px; }
.field label { display:block; color:var(--muted); font-size:.85rem; margin-bottom:8px; }
.input { width:100%; padding:12px 14px; background:#101010; color:var(--text); border:1px solid var(--border); border-radius:6px; font:inherit; }
.input:focus { outline:none; border-color:var(--gold); }
.video-section { display:none; }
.video-section.active { display:block; }
.video-wrap { position:relative; background:#050505; border:1px solid var(--border); border-radius:8px; overflow:hidden; user-select:none; }
.video-wrap video { display:block; width:100%; max-height:520px; background:#000; }
.selection-layer { position:absolute; left:0; top:0; width:0; height:0; cursor:crosshair; display:none; }
.selection-layer.active { display:block; }
.selection-box { position:absolute; border:2px solid var(--gold); background:rgba(255,215,0,.14); box-shadow:0 0 0 9999px rgba(0,0,0,.16); pointer-events:none; display:none; }
.selection-box.visible { display:block; }
.selection-box.visible::after { content:'当前框'; position:absolute; top:-28px; left:0; padding:3px 7px; border:1px solid rgba(255,215,0,.45); background:rgba(0,0,0,.8); color:var(--gold); font-size:12px; white-space:nowrap; }
.overlay-box { position:absolute; border:1px solid rgba(126,200,255,.95); background:rgba(126,200,255,.13); pointer-events:none; }
.overlay-box.active { border-color:var(--gold); background:rgba(255,215,0,.16); }
.overlay-box::after { content:attr(data-label); position:absolute; top:-23px; left:0; padding:2px 6px; border-radius:999px; background:rgba(0,0,0,.78); color:#bfe6ff; font-size:11px; white-space:nowrap; }
.timeline { margin-top:18px; }
.timeline-track { position:relative; height:46px; border:1px solid var(--border); border-radius:8px; background:#0f0f0f; cursor:crosshair; overflow:hidden; }
.timeline-selection { position:absolute; top:8px; bottom:8px; border:1px solid var(--gold); background:rgba(255,215,0,.2); border-radius:6px; min-width:3px; }
.timeline-selection.active { box-shadow:0 0 0 1px rgba(255,215,0,.45); }
.timeline-playhead { position:absolute; top:0; bottom:0; width:2px; background:#fff; opacity:.7; pointer-events:none; }
.timeline-meta { display:flex; justify-content:space-between; gap:12px; margin-top:8px; color:var(--muted); font-size:.82rem; }
.btn-group { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
.btn { padding:14px 24px; border-radius:6px; text-decoration:none; font-weight:300; font-size:.9rem; transition:all .3s; cursor:pointer; border:none; font-family:inherit; letter-spacing:.5px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:var(--gold); color:var(--bg); }
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,215,0,.3); }
.btn-secondary { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--text); transform:translateY(-2px); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid rgba(255,255,255,.1); }
.btn-ghost:hover { color:var(--text); border-color:rgba(255,255,255,.3); }
.btn-danger { background:transparent; color:#ff8888; border:1px solid rgba(255,102,102,.28); }
.status { margin-top:24px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--muted); line-height:1.7; word-break:break-word; }
.status.ok { color:var(--ok); border-color:rgba(90,208,96,.28); }
.status.warn { color:var(--warn); border-color:rgba(240,196,106,.28); }
.status.err { color:var(--danger); border-color:rgba(255,102,102,.28); }
.progress-bg { height:10px; background:#222; border-radius:5px; overflow:hidden; margin-top:14px; }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--gold),#ffed4a); transition:width .3s; }
.segment-list { display:grid; gap:10px; margin-top:16px; }
.segment-item { border:1px solid var(--border); border-radius:8px; padding:12px; background:#101010; }
.segment-head { display:flex; justify-content:space-between; gap:12px; align-items:center; color:var(--text); font-size:.9rem; }
.segment-meta { color:var(--muted); font-size:.8rem; line-height:1.7; margin-top:6px; }
.segment-card { display:grid; gap:10px; padding:12px; border:1px solid var(--border); border-radius:8px; background:#101010; }
.segment-card.succeeded { border-color:rgba(90,208,96,.28); }
.segment-card.failed { border-color:rgba(255,102,102,.32); }
.segment-card video { width:100%; max-height:260px; background:#000; border-radius:6px; }
.download-area { display:none; }
.download-area.active { display:block; }
footer { padding:28px 48px; border-top:1px solid var(--border); font-size:.75rem; color:var(--muted); text-align:center; }
@media (max-width:768px) { nav { padding-left:24px; padding-right:24px; } .container { padding:60px 24px; } .upload-area { padding:40px 20px; } .btn-group { flex-direction:column; } .btn { width:100%; text-align:center; } .timeline-meta { flex-direction:column; } }
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo-wrap">
    <img src="../images/logo-icon.png" alt="Soda Media Logo">
    <div class="logo-text"><strong>soda</strong><span>MEDIA</span></div>
  </a>
  <a href="index.html" class="nav-back">返回工具</a>
</nav>

<main class="container">
  <h1 class="page-title">视频去字幕</h1>
  <p class="page-desc">上传视频，直接在预览画面框选字幕区域；需要处理哪一段，就在时间线上拖出来。</p>

  <div class="upload-area" id="uploadArea" role="button" tabindex="0" aria-label="选择视频文件">
    <input id="fileInput" type="file" accept="video/*" hidden>
    <div class="upload-icon">🎞️</div>
    <div class="upload-text">点击或拖拽视频到这里</div>
    <div class="upload-hint">上传后框选字幕区域，再在时间线上选择处理片段</div>
    <div class="file-name" id="fileName"></div>
  </div>

  <section class="card" id="tokenCard">
    <div class="field" style="margin-bottom:0;">
      <label for="accessToken">访问码</label>
      <input class="input" id="accessToken" type="password" autocomplete="off" placeholder="粘贴 Access Token">
      <div class="btn-group">
        <button class="btn btn-secondary" id="saveTokenBtn" type="button">保存访问码</button>
        <button class="btn btn-ghost" id="clearTokenBtn" type="button">清除</button>
      </div>
    </div>
  </section>

  <section class="card video-section" id="previewShell">
    <div class="video-wrap" id="videoWrap">
      <video id="videoPreview" controls playsinline></video>
      <div class="selection-layer" id="selectionLayer" title="拖拽框选字幕区域">
        <div class="selection-box" id="selectionBox"></div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" id="selectModeBtn" type="button">开启画面框选</button>
      <button class="btn btn-secondary" id="addCurrentBoxBtn" type="button">添加当前框</button>
      <button class="btn btn-ghost" id="defaultBoxBtn" type="button">使用底部默认框</button>
      <button class="btn btn-danger" id="clearCurrentBoxBtn" type="button">清除当前框</button>
    </div>
    <div class="help" style="margin-top:10px;">可连续添加多个框。同一时间段有多处字幕时，建议添加多个小框，不要整条底部全选。</div>

    <div class="timeline">
      <div class="timeline-track" id="timelineTrack" title="在这里拖拽选择处理时间段">
        <div class="timeline-playhead" id="timelinePlayhead"></div>
      </div>
      <div class="timeline-meta">
        <span id="timelineHint">拖拽时间线选择处理片段；不选则默认处理当前 5 秒。</span>
        <span id="timelineDuration">-</span>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary" id="addSegmentBtn" type="button">添加当前 5 秒</button>
        <button class="btn btn-secondary" id="addCurrentBoxToActiveBtn" type="button">把当前框加入选中片段</button>
        <button class="btn btn-ghost" id="clearSegmentsBtn" type="button">清空片段</button>
      </div>
      <div class="segment-list" id="segmentList"></div>
    </div>
  </section>

  <div class="btn-group" id="submitGroup" style="display:none;">
    <button class="btn btn-primary" id="submitBtn" type="button">提交去字幕任务</button>
  </div>

  <div class="status" id="statusLine">等待上传视频。</div>
  <div class="progress-bg"><div class="progress-fill" id="progressBar"></div></div>

  <div class="download-area" id="downloadArea" style="margin-top:18px;">
    <button class="btn btn-primary" id="downloadBtn" type="button">下载处理后视频</button>
  </div>
  <div class="segment-list" id="segmentResultList"></div>
</main>

<footer>© 2026 SODA567</footer>

<script>
const DEFAULT_COORDS = { x: 0, y: 0.78, w: 1, h: 0.18, coord_mode: 'relative' };
const API_BASE = 'https://api.soda567.dpdns.org';
const TOKEN_KEY = 'soda_access_token';

const el = {
  accessToken: document.getElementById('accessToken'),
  saveTokenBtn: document.getElementById('saveTokenBtn'),
  clearTokenBtn: document.getElementById('clearTokenBtn'),
  fileInput: document.getElementById('fileInput'),
  uploadArea: document.getElementById('uploadArea'),
  fileName: document.getElementById('fileName'),
  previewShell: document.getElementById('previewShell'),
  videoPreview: document.getElementById('videoPreview'),
  videoWrap: document.getElementById('videoWrap'),
  selectionLayer: document.getElementById('selectionLayer'),
  selectionBox: document.getElementById('selectionBox'),
  selectModeBtn: document.getElementById('selectModeBtn'),
  addCurrentBoxBtn: document.getElementById('addCurrentBoxBtn'),
  addCurrentBoxToActiveBtn: document.getElementById('addCurrentBoxToActiveBtn'),
  clearCurrentBoxBtn: document.getElementById('clearCurrentBoxBtn'),
  defaultBoxBtn: document.getElementById('defaultBoxBtn'),
  timelineTrack: document.getElementById('timelineTrack'),
  timelinePlayhead: document.getElementById('timelinePlayhead'),
  timelineHint: document.getElementById('timelineHint'),
  timelineDuration: document.getElementById('timelineDuration'),
  addSegmentBtn: document.getElementById('addSegmentBtn'),
  clearSegmentsBtn: document.getElementById('clearSegmentsBtn'),
  segmentList: document.getElementById('segmentList'),
  submitGroup: document.getElementById('submitGroup'),
  submitBtn: document.getElementById('submitBtn'),
  statusLine: document.getElementById('statusLine'),
  progressBar: document.getElementById('progressBar'),
  downloadArea: document.getElementById('downloadArea'),
  downloadBtn: document.getElementById('downloadBtn'),
  segmentResultList: document.getElementById('segmentResultList')
};

let currentFile = null;
let objectUrl = '';
let activeTaskId = '';
let pollTimer = 0;
let dragStart = null;
let isDragging = false;
let selectMode = false;
let hasCurrentRegion = false;
let currentRegion = { ...DEFAULT_COORDS };
let segments = [];
let activeSegmentIndex = -1;
let timelineDrag = null;

function getSodaAccessToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setSodaAccessToken(value) { const token = String(value || '').trim(); token ? localStorage.setItem(TOKEN_KEY, token) : localStorage.removeItem(TOKEN_KEY); }
function withSodaAccessToken(headers = {}) { const token = getSodaAccessToken(); if (token) headers['X-Soda-Access-Token'] = token; return headers; }
function apiUrl(path) { return API_BASE + path; }
function escapeHtml(value) { return String(value || '').replace(/[&<>"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch])); }
function formatTime(seconds) { const s = Math.max(0, Number(seconds) || 0); const m = Math.floor(s / 60); const rest = Math.floor(s % 60).toString().padStart(2, '0'); const ms = Math.round((s % 1) * 10); return ms ? `${m}:${rest}.${ms}` : `${m}:${rest}`; }
function formatBytes(bytes) { if (!Number.isFinite(bytes)) return '-'; const units=['B','KB','MB','GB']; let size=bytes, i=0; while(size>=1024&&i<units.length-1){size/=1024;i++;} return (i?size.toFixed(1):size)+units[i]; }
function setStatus(message, type = '') { el.statusLine.textContent = message; el.statusLine.className = 'status' + (type ? ' ' + type : ''); }
function setProgress(percent) { el.progressBar.style.width = Math.max(0, Math.min(100, percent)) + '%'; }
function stopPolling() { if (pollTimer) clearTimeout(pollTimer); pollTimer = 0; }
function apiDone() { return activeTaskId && activeTaskId !== ''; }

function getRenderedVideoContentRect() {
  const videoRect = el.videoPreview.getBoundingClientRect();
  const wrapRect = el.videoWrap.getBoundingClientRect();
  const videoW = el.videoPreview.videoWidth || 0;
  const videoH = el.videoPreview.videoHeight || 0;
  if (!videoRect.width || !videoRect.height || !videoW || !videoH) return { left:0, top:0, width:videoRect.width || wrapRect.width || 1, height:videoRect.height || wrapRect.height || 1 };
  const videoRatio = videoW / videoH;
  const boxRatio = videoRect.width / videoRect.height;
  let width = videoRect.width, height = videoRect.height, left = videoRect.left - wrapRect.left, top = videoRect.top - wrapRect.top;
  if (boxRatio > videoRatio) { width = height * videoRatio; left += (videoRect.width - width) / 2; }
  else if (boxRatio < videoRatio) { height = width / videoRatio; top += (videoRect.height - height) / 2; }
  return { left, top, width, height };
}
function syncSelectionLayerToVideoContent() {
  const rect = getRenderedVideoContentRect();
  el.selectionLayer.style.left = rect.left + 'px';
  el.selectionLayer.style.top = rect.top + 'px';
  el.selectionLayer.style.width = rect.width + 'px';
  el.selectionLayer.style.height = rect.height + 'px';
  return rect;
}
function setSelectMode(enabled) {
  selectMode = !!enabled;
  el.selectionLayer.classList.toggle('active', selectMode);
  el.selectModeBtn.textContent = selectMode ? '关闭画面框选' : '开启画面框选';
}
function renderSelectionBox() {
  syncSelectionLayerToVideoContent();
  el.selectionBox.classList.toggle('visible', hasCurrentRegion);
  if (!hasCurrentRegion) return;
  el.selectionBox.style.left = (currentRegion.x * 100) + '%';
  el.selectionBox.style.top = (currentRegion.y * 100) + '%';
  el.selectionBox.style.width = (currentRegion.w * 100) + '%';
  el.selectionBox.style.height = (currentRegion.h * 100) + '%';
}
function setCurrentRegion(region, visible = true) {
  currentRegion = { coord_mode:'relative', x:Number(region.x), y:Number(region.y), w:Number(region.w), h:Number(region.h) };
  hasCurrentRegion = !!visible;
  renderSelectionBox();
}
function clearCurrentRegion() { hasCurrentRegion = false; renderSelectionBox(); }
function pointToRelative(event) {
  syncSelectionLayerToVideoContent();
  const rect = el.selectionLayer.getBoundingClientRect();
  return { x: Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width)), y: Math.max(0, Math.min(1, (event.clientY - rect.top) / rect.height)) };
}
function cloneCurrentRegion() {
  if (!hasCurrentRegion) throw new Error('请先在画面上框选字幕区域，或点击“使用底部默认框”。');
  return { coord_mode:'relative', x:round3(currentRegion.x), y:round3(currentRegion.y), w:round3(currentRegion.w), h:round3(currentRegion.h) };
}
function round3(n) { return Math.round(Number(n) * 1000) / 1000; }

function normalizeSegment(start, end) {
  const duration = Number(el.videoPreview.duration) || 0;
  let s = Math.max(0, Number(start) || 0);
  let e = Math.max(s + 0.1, Number(end) || (s + 5));
  if (duration) { s = Math.min(s, duration); e = Math.min(Math.max(e, s + 0.1), duration); }
  return { start:round3(s), end:round3(e), regions:[] };
}
function defaultCurrentFiveSeconds() {
  const start = el.videoPreview.currentTime || 0;
  return normalizeSegment(start, start + 5);
}
function ensureRegionList(seg) { if (!Array.isArray(seg.regions)) seg.regions = []; return seg.regions; }
function addSegment(start, end, regions) {
  const seg = normalizeSegment(start, end);
  seg.regions = Array.isArray(regions) ? regions : (hasCurrentRegion ? [cloneCurrentRegion()] : []);
  segments.push(seg);
  activeSegmentIndex = segments.length - 1;
  renderSegments();
  renderStoredRegionOverlays();
}
function addCurrentRegionToActiveSegment() {
  const region = cloneCurrentRegion();
  if (!segments.length) {
    const seg = defaultCurrentFiveSeconds();
    seg.regions = [region];
    segments.push(seg);
    activeSegmentIndex = 0;
  } else {
    const index = activeSegmentIndex >= 0 ? activeSegmentIndex : segments.length - 1;
    ensureRegionList(segments[index]).push(region);
    activeSegmentIndex = index;
  }
  renderSegments();
  renderStoredRegionOverlays();
  setStatus('已添加当前框。', 'ok');
}
function renderStoredRegionOverlays() {
  if (!el.selectionLayer) return;
  syncSelectionLayerToVideoContent();
  el.selectionLayer.querySelectorAll('.overlay-box').forEach((node) => node.remove());
  segments.forEach((seg, sIndex) => ensureRegionList(seg).forEach((region, rIndex) => {
    const box = document.createElement('div');
    box.className = 'overlay-box' + (sIndex === activeSegmentIndex ? ' active' : '');
    box.dataset.label = `片段${sIndex + 1}-框${rIndex + 1}`;
    box.style.left = (region.x * 100) + '%';
    box.style.top = (region.y * 100) + '%';
    box.style.width = (region.w * 100) + '%';
    box.style.height = (region.h * 100) + '%';
    el.selectionLayer.appendChild(box);
  }));
}
function renderSegments() {
  renderTimeline();
  if (!segments.length) {
    el.segmentList.innerHTML = '<div class="help">还没有片段：可在时间线上拖拽选择，或直接点「添加当前 5 秒」。</div>';
    return;
  }
  el.segmentList.innerHTML = segments.map((seg, index) => {
    const regions = ensureRegionList(seg);
    return `<div class="segment-item" style="border-color:${index === activeSegmentIndex ? 'rgba(255,215,0,.45)' : 'var(--border)'}">
      <div class="segment-head">
        <span>片段 ${index + 1} · ${formatTime(seg.start)} - ${formatTime(seg.end)}</span>
        <span>${regions.length} 个框</span>
      </div>
      <div class="segment-meta">${regions.length ? regions.map((_, i) => `框${i + 1}`).join(' / ') : '还没有框：选中此片段后添加当前框'}</div>
      <div class="btn-group" style="margin-top:10px;">
        <button class="btn btn-secondary segment-active" type="button" data-index="${index}">${index === activeSegmentIndex ? '已选中' : '选中'}</button>
        <button class="btn btn-secondary region-add" type="button" data-index="${index}">加当前框</button>
        <button class="btn btn-danger segment-remove" type="button" data-index="${index}">删除片段</button>
      </div>
    </div>`;
  }).join('');
}
function renderTimeline() {
  if (!el.timelineTrack) return;
  el.timelineTrack.querySelectorAll('.timeline-selection').forEach((node) => node.remove());
  const duration = Number(el.videoPreview.duration) || 0;
  el.timelineDuration.textContent = duration ? `总时长 ${formatTime(duration)}` : '-';
  const current = duration ? Math.max(0, Math.min(1, (el.videoPreview.currentTime || 0) / duration)) : 0;
  el.timelinePlayhead.style.left = (current * 100) + '%';
  segments.forEach((seg, index) => {
    if (!duration) return;
    const item = document.createElement('div');
    item.className = 'timeline-selection' + (index === activeSegmentIndex ? ' active' : '');
    item.style.left = (seg.start / duration * 100) + '%';
    item.style.width = Math.max(0.5, ((seg.end - seg.start) / duration * 100)) + '%';
    item.title = `片段 ${index + 1}: ${formatTime(seg.start)} - ${formatTime(seg.end)}`;
    item.dataset.index = String(index);
    el.timelineTrack.appendChild(item);
  });
}
function timelinePointToSeconds(event) {
  const rect = el.timelineTrack.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
  return ratio * (Number(el.videoPreview.duration) || 0);
}

function selectFile(file) {
  if (!file) return;
  if (!file.type.startsWith('video/')) { setStatus('请选择视频文件。', 'err'); return; }
  currentFile = file;
  if (objectUrl) URL.revokeObjectURL(objectUrl);
  objectUrl = URL.createObjectURL(file);
  el.videoPreview.src = objectUrl;
  el.previewShell.classList.add('active');
  el.submitGroup.style.display = 'flex';
  el.fileName.textContent = file.name + ' · ' + formatBytes(file.size);
  activeTaskId = '';
  segments = [];
  activeSegmentIndex = -1;
  clearCurrentRegion();
  stopPolling();
  setProgress(0);
  el.downloadArea.classList.remove('active');
  el.segmentResultList.innerHTML = '';
  renderSegments();
  setStatus('视频已选择：先在画面框选字幕，再在时间线上选择片段。', 'warn');
}

function friendlyErrorMessage(data, fallback) {
  const code = data && (data.error || data.code);
  const msg = (data && (data.message || data.raw_message)) || fallback || '';
  const usage = (data && data.token && data.token.usage_today) || {};
  if (code === 'quota_exceeded') {
    if ((data.raw_message || msg || '').includes('bytes')) return `今日上传流量已用完（已用 ${usage.bytes ? (usage.bytes/1024/1024).toFixed(1) : '-'}MB）。`;
    return `今日提交次数已用完（已用 ${usage.count ?? '-'} 次）。`;
  }
  if (code === 'invalid') return '访问码无效，请检查 Access Token 是否正确。';
  if (code === 'disabled') return '访问码已停用。';
  if (code === 'expired') return '访问码已过期。';
  if (code === 'not_allowed') return '当前访问码没有这个工具的权限。';
  return msg || fallback || '请求失败';
}
async function readError(res) {
  const text = await res.text().catch(() => '');
  if (!text) return res.status + ' ' + res.statusText;
  try { return friendlyErrorMessage(JSON.parse(text), text); } catch (_) { return text.slice(0, 300); }
}
function getSubmitSegments() {
  const usable = segments.map((seg) => ({ ...normalizeSegment(seg.start, seg.end), regions: ensureRegionList(seg) })).filter((seg) => seg.end > seg.start && seg.regions.length);
  if (usable.length) return usable;
  if (!hasCurrentRegion) throw new Error('请先框选字幕区域，或点击“使用底部默认框”。');
  const seg = defaultCurrentFiveSeconds();
  seg.regions = [cloneCurrentRegion()];
  return [seg];
}
async function submitTask() {
  try {
    if (!currentFile) throw new Error('请先上传视频文件');
    const submitSegments = getSubmitSegments();
    const token = (el.accessToken.value || '').trim();
    if (token !== getSodaAccessToken()) setSodaAccessToken(token);
    stopPolling();
    el.submitBtn.disabled = true;
    el.downloadArea.classList.remove('active');
    setProgress(12);
    setStatus('正在上传并创建任务…', 'warn');
    const form = new FormData();
    form.append('file', currentFile, currentFile.name);
    form.append('mode', 'ai_inpaint');
    form.append('segments_json', JSON.stringify(submitSegments));
    form.append('coord_mode', 'relative');
    form.append('x', String(submitSegments[0].regions[0].x));
    form.append('y', String(submitSegments[0].regions[0].y));
    form.append('w', String(submitSegments[0].regions[0].w));
    form.append('h', String(submitSegments[0].regions[0].h));
    const res = await fetch(apiUrl('/api/video-subtitle-remover/tasks'), { method:'POST', headers:withSodaAccessToken({}), body:form });
    if (!res.ok) throw new Error(await readError(res));
    const data = await res.json();
    activeTaskId = data.task_id || '';
    if (!activeTaskId) throw new Error('后端未返回 task_id');
    setProgress(28);
    setStatus('任务已创建，正在处理…', 'warn');
    pollTask();
  } catch (error) {
    setProgress(0);
    setStatus('提交失败：' + error.message, 'err');
  } finally { el.submitBtn.disabled = false; }
}
function statusToProgress(status) {
  if (status === 'queued') return 36;
  if (status === 'running' || status === 'processing') return 68;
  if (['succeeded','success','completed','partial_failed','failed','error'].includes(status)) return 100;
  return 45;
}
function renderSegmentResults(task) {
  const list = task && Array.isArray(task.segments) ? task.segments : [];
  if (!list.length) { el.segmentResultList.innerHTML = ''; return; }
  el.segmentResultList.innerHTML = list.map((seg) => {
    const cls = seg.status === 'succeeded' ? 'succeeded' : (seg.status === 'failed' ? 'failed' : '');
    const preview = seg.status === 'succeeded' && seg.preview_url ? `<video controls playsinline src="${apiUrl(seg.preview_url)}"></video>` : '';
    const download = seg.status === 'succeeded' && seg.download_url ? `<button class="btn btn-primary segment-download" type="button" data-url="${seg.download_url}" data-index="${seg.index || ''}">下载片段</button>` : '';
    const retry = seg.status === 'failed' ? `<button class="btn btn-secondary segment-retry" type="button" data-id="${seg.segment_id}">重试片段</button>` : '';
    const err = seg.error ? `<div class="status err">${escapeHtml(seg.error)}</div>` : '';
    return `<div class="segment-card ${cls}"><div>片段 ${seg.index || '-'}：${seg.start}s - ${seg.end}s · ${seg.status || 'queued'}</div>${err}${preview}<div class="btn-group">${download}${retry}</div></div>`;
  }).join('');
}
async function pollTask() {
  if (!activeTaskId) return;
  try {
    const res = await fetch(apiUrl('/api/video-subtitle-remover/tasks/' + encodeURIComponent(activeTaskId)), { headers:withSodaAccessToken({}) });
    if (!res.ok) throw new Error(await readError(res));
    const data = await res.json();
    renderSegmentResults(data);
    const status = data.status || 'unknown';
    setProgress(statusToProgress(status));
    if (['succeeded','success','completed'].includes(status)) {
      const hasSegments = Array.isArray(data.segments) && data.segments.length > 0;
      setStatus(hasSegments ? '片段处理完成，可分别预览/下载。' : '处理完成，可以下载。', 'ok');
      el.downloadArea.classList.toggle('active', !hasSegments);
      stopPolling(); return;
    }
    if (status === 'partial_failed') { setStatus('部分片段处理失败；成功片段可下载，失败片段可重试。', 'warn'); stopPolling(); return; }
    if (status === 'failed' || status === 'error') { setStatus('处理失败：' + (data.error || data.message || '任务处理失败'), 'err'); stopPolling(); return; }
    setStatus('当前状态：' + status + (data.phase ? ' / ' + data.phase : ''), 'warn');
    pollTimer = setTimeout(pollTask, 3000);
  } catch (error) { setStatus('查询状态失败：' + error.message, 'err'); pollTimer = setTimeout(pollTask, 5000); }
}
async function downloadResult() {
  if (!activeTaskId) return;
  try {
    const res = await fetch(apiUrl('/api/video-subtitle-remover/tasks/' + encodeURIComponent(activeTaskId) + '/download'), { headers:withSodaAccessToken({}) });
    if (!res.ok) throw new Error(await readError(res));
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'video') + '_subtitle_removed.mp4';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  } catch (error) { setStatus('下载失败：' + error.message, 'err'); }
}
async function downloadSegment(url, index) {
  try {
    const res = await fetch(apiUrl(url), { headers:withSodaAccessToken({}) });
    if (!res.ok) throw new Error(await readError(res));
    const blob = await res.blob();
    const object = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = object; a.download = `subtitle_removed_segment_${index || ''}.mp4`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(object), 30000);
  } catch (error) { setStatus('片段下载失败：' + error.message, 'err'); }
}
async function retrySegment(segmentId) {
  if (!activeTaskId || !segmentId) return;
  try {
    const res = await fetch(apiUrl('/api/video-subtitle-remover/tasks/' + encodeURIComponent(activeTaskId) + '/segments/' + encodeURIComponent(segmentId) + '/retry'), { method:'POST', headers:withSodaAccessToken({}) });
    if (!res.ok) throw new Error(await readError(res));
    setStatus('片段已加入重试队列。', 'warn');
    stopPolling(); pollTask();
  } catch (error) { setStatus('片段重试失败：' + error.message, 'err'); }
}

el.uploadArea.addEventListener('click', () => el.fileInput.click());
el.uploadArea.addEventListener('keydown', (event) => { if (event.key === 'Enter' || event.key === ' ') { event.preventDefault(); el.fileInput.click(); } });
el.fileInput.addEventListener('change', () => selectFile(el.fileInput.files[0]));
['dragenter','dragover'].forEach((type) => el.uploadArea.addEventListener(type, (event) => { event.preventDefault(); el.uploadArea.classList.add('dragover'); }));
['dragleave','drop'].forEach((type) => el.uploadArea.addEventListener(type, (event) => { event.preventDefault(); el.uploadArea.classList.remove('dragover'); }));
el.uploadArea.addEventListener('drop', (event) => selectFile(event.dataTransfer.files[0]));
el.videoPreview.addEventListener('loadedmetadata', () => { renderSelectionBox(); renderSegments(); });
el.videoPreview.addEventListener('timeupdate', renderTimeline);
window.addEventListener('resize', () => { renderSelectionBox(); renderStoredRegionOverlays(); renderTimeline(); });
el.selectModeBtn.addEventListener('click', () => setSelectMode(!selectMode));
el.defaultBoxBtn.addEventListener('click', () => { setCurrentRegion(DEFAULT_COORDS, true); setStatus('已使用底部默认框，可直接提交或加入片段。', 'warn'); });
el.clearCurrentBoxBtn.addEventListener('click', () => { clearCurrentRegion(); setStatus('当前框已清除。', 'warn'); });
el.addCurrentBoxBtn.addEventListener('click', () => { try { addCurrentRegionToActiveSegment(); } catch (error) { setStatus(error.message, 'warn'); } });
el.addCurrentBoxToActiveBtn.addEventListener('click', () => { try { addCurrentRegionToActiveSegment(); } catch (error) { setStatus(error.message, 'warn'); } });
el.addSegmentBtn.addEventListener('click', () => { try { const seg = defaultCurrentFiveSeconds(); addSegment(seg.start, seg.end, hasCurrentRegion ? [cloneCurrentRegion()] : []); } catch (error) { setStatus(error.message, 'warn'); } });
el.clearSegmentsBtn.addEventListener('click', () => { segments = []; activeSegmentIndex = -1; renderSegments(); renderStoredRegionOverlays(); });
el.submitBtn.addEventListener('click', submitTask);
el.downloadBtn.addEventListener('click', downloadResult);
el.saveTokenBtn.addEventListener('click', () => { setSodaAccessToken(el.accessToken.value); setStatus(getSodaAccessToken() ? '访问码已保存。' : '访问码为空，已清除。', 'ok'); });
el.clearTokenBtn.addEventListener('click', () => { el.accessToken.value = ''; setSodaAccessToken(''); setStatus('访问码已清除。', 'warn'); });
el.segmentList.addEventListener('click', (event) => {
  const removeBtn = event.target.closest('.segment-remove');
  const activeBtn = event.target.closest('.segment-active');
  const addBtn = event.target.closest('.region-add');
  if (removeBtn) { segments.splice(Number(removeBtn.dataset.index), 1); if (activeSegmentIndex >= segments.length) activeSegmentIndex = segments.length - 1; renderSegments(); renderStoredRegionOverlays(); }
  if (activeBtn) { activeSegmentIndex = Number(activeBtn.dataset.index); renderSegments(); renderStoredRegionOverlays(); }
  if (addBtn) { try { ensureRegionList(segments[Number(addBtn.dataset.index)]).push(cloneCurrentRegion()); activeSegmentIndex = Number(addBtn.dataset.index); renderSegments(); renderStoredRegionOverlays(); } catch (error) { setStatus(error.message, 'warn'); } }
});
el.segmentResultList.addEventListener('click', (event) => {
  const retryBtn = event.target.closest('.segment-retry');
  const downloadBtn = event.target.closest('.segment-download');
  if (retryBtn) retrySegment(retryBtn.dataset.id);
  if (downloadBtn) downloadSegment(downloadBtn.dataset.url, downloadBtn.dataset.index);
});
el.selectionLayer.addEventListener('pointerdown', (event) => { if (!currentFile) return; dragStart = pointToRelative(event); isDragging = true; el.selectionLayer.setPointerCapture(event.pointerId); });
el.selectionLayer.addEventListener('pointermove', (event) => {
  if (!isDragging || !dragStart) return;
  const end = pointToRelative(event);
  const x = Math.min(dragStart.x, end.x), y = Math.min(dragStart.y, end.y), w = Math.abs(end.x - dragStart.x), h = Math.abs(end.y - dragStart.y);
  if (w > 0.005 && h > 0.005) setCurrentRegion({ x, y, w, h, coord_mode:'relative' }, true);
});
el.selectionLayer.addEventListener('pointerup', (event) => { isDragging = false; dragStart = null; try { el.selectionLayer.releasePointerCapture(event.pointerId); } catch (_) {} renderStoredRegionOverlays(); });
el.timelineTrack.addEventListener('pointerdown', (event) => { if (!currentFile || !el.videoPreview.duration) return; timelineDrag = { start: timelinePointToSeconds(event) }; el.timelineTrack.setPointerCapture(event.pointerId); });
el.timelineTrack.addEventListener('pointermove', (event) => {
  if (!timelineDrag) return;
  const end = timelinePointToSeconds(event);
  const temp = normalizeSegment(Math.min(timelineDrag.start, end), Math.max(timelineDrag.start, end));
  el.timelineHint.textContent = `选择中：${formatTime(temp.start)} - ${formatTime(temp.end)}`;
});
el.timelineTrack.addEventListener('pointerup', (event) => {
  if (!timelineDrag) return;
  const end = timelinePointToSeconds(event);
  const start = Math.min(timelineDrag.start, end), finish = Math.max(timelineDrag.start, end);
  timelineDrag = null;
  try { el.timelineTrack.releasePointerCapture(event.pointerId); } catch (_) {}
  if (Math.abs(finish - start) < 0.15) { el.videoPreview.currentTime = start; renderTimeline(); return; }
  addSegment(start, finish, hasCurrentRegion ? [cloneCurrentRegion()] : []);
  el.timelineHint.textContent = '已添加时间片段，可继续添加框或提交。';
});
window.addEventListener('beforeunload', () => { stopPolling(); if (objectUrl) URL.revokeObjectURL(objectUrl); });

el.accessToken.value = getSodaAccessToken();
renderSegments();
renderSelectionBox();
</script>
</body>
</html>
