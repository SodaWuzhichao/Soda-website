<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音文案提取 | SODA567</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080808;
  --surface: rgba(255,255,255,0.04);
  --surface-strong: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --text: #f5f5f7;
  --muted: rgba(245,245,247,0.58);
  --subtle: rgba(245,245,247,0.36);
  --accent: #f3d36a;
  --accent-ink: #151515;
  --danger: #ff8b93;
  --danger-bg: rgba(135, 26, 38, 0.28);
  --ok: #7ddc8b;
  --ok-bg: rgba(34, 95, 44, 0.28);
}
body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top, rgba(243,211,106,0.14), transparent 28%),
    linear-gradient(180deg, #0b0b0b 0%, #070707 100%);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 32px;
}
.nav-back {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: color .2s ease, border-color .2s ease;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 10px 16px;
}
.nav-back:hover { color: var(--text); border-color: rgba(243,211,106,0.4); }
.page {
  max-width: 920px;
  margin: 0 auto;
  padding: 56px 24px 96px;
}
.hero {
  max-width: 760px;
  margin: 0 auto 28px;
  text-align: center;
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 22px;
}
.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4.4rem);
  line-height: 1.02;
  letter-spacing: -0.06em;
  font-weight: 400;
}
.hero p {
  margin-top: 18px;
  color: var(--muted);
  line-height: 1.85;
  font-size: 15px;
}
.shell {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px;
  border-radius: 28px;
  background: rgba(255,255,255,0.035);
  border: 1px solid var(--border);
  box-shadow: 0 24px 70px rgba(0,0,0,0.28);
  backdrop-filter: blur(18px);
}
.service-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 18px;
}
.service-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #6d6d72;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
}
.service-pill.online .service-dot { background: var(--ok); box-shadow: 0 0 0 4px rgba(125,220,139,0.12); }
.service-pill.offline .service-dot { background: var(--danger); box-shadow: 0 0 0 4px rgba(255,139,147,0.12); }
.composer {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
}
.input-wrap {
  position: relative;
}
.input-wrap input {
  width: 100%;
  height: 60px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.22);
  color: var(--text);
  padding: 0 20px;
  font-size: 15px;
  outline: none;
  transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
}
.input-wrap input::placeholder { color: rgba(245,245,247,0.34); }
.input-wrap input:focus {
  border-color: rgba(243,211,106,0.55);
  box-shadow: 0 0 0 4px rgba(243,211,106,0.08);
  background: rgba(0,0,0,0.28);
}
.primary-btn {
  height: 60px;
  border: none;
  border-radius: 18px;
  padding: 0 26px;
  font-size: 15px;
  font-weight: 500;
  color: var(--accent-ink);
  background: var(--accent);
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
  white-space: nowrap;
}
.primary-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(243,211,106,0.18); }
.primary-btn:disabled { opacity: .62; cursor: not-allowed; }
.microcopy {
  margin-top: 12px;
  color: var(--subtle);
  font-size: 12px;
  line-height: 1.8;
}
.card {
  margin-top: 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.16);
  padding: 18px;
}
.card.hidden { display: none; }
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.card-title { font-size: 14px; color: var(--text); }
.card-badge {
  font-size: 12px;
  color: var(--muted);
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
}
.progress-copy {
  color: #d9d9dc;
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-wrap;
}
.meta-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.meta-item {
  padding: 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}
.meta-item .k {
  color: var(--subtle);
  font-size: 11px;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.meta-item .v {
  color: var(--text);
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}
.error-box {
  margin-top: 16px;
  padding: 16px 18px;
  border-radius: 18px;
  border: 1px solid rgba(255,139,147,0.24);
  background: var(--danger-bg);
  color: #ffb7bd;
  white-space: pre-wrap;
  line-height: 1.75;
  font-size: 13px;
}
.result-box {
  min-height: 240px;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.9;
  font-size: 14px;
}
.result-placeholder { color: var(--subtle); }
.result-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.result-note {
  color: var(--subtle);
  font-size: 12px;
}
.secondary-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.ghost-btn {
  height: 42px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  padding: 0 16px;
  cursor: pointer;
  transition: color .18s ease, border-color .18s ease;
}
.ghost-btn:hover:not(:disabled) { color: var(--text); border-color: rgba(243,211,106,0.35); }
.toast {
  position: fixed;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%) translateY(16px);
  opacity: 0;
  pointer-events: none;
  transition: all .18s ease;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(14,14,14,0.92);
  color: var(--text);
  font-size: 13px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: rgba(125,220,139,0.25); color: var(--ok); }
.toast.err { border-color: rgba(255,139,147,0.25); color: var(--danger); }
@media (max-width: 768px) {
  nav { padding: 20px 18px; }
  .page { padding: 28px 16px 72px; }
  .shell { padding: 18px; border-radius: 22px; }
  .composer { grid-template-columns: 1fr; }
  .primary-btn { width: 100%; }
  .meta-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 520px) {
  .hero h1 { letter-spacing: -0.08em; }
  .meta-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<nav>
  <a href="../index.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;line-height:1;">
    <img src="../images/logo-icon.png" style="height:52px;width:auto;border-radius:4px;">
    <div style="display:flex;flex-direction:column;justify-content:center;">
      <span style="font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px;color:#fff;font-size:1.2em;">soda</span>
      <span style="font-weight:300;font-family:'DM Sans',sans-serif;letter-spacing:3.5px;font-size:0.65em;opacity:0.8;color:#fff;margin-top:2px;">MEDIA</span>
    </div>
  </a>
  <a href="index.html" class="nav-back">工具页</a>
</nav>

<div class="page">
  <section class="hero">
    <div class="eyebrow">抖音链接 · 自动转文案</div>
    <h1>贴链接，等结果。</h1>
    <p>把抖音分享链接丢进来，系统会自动解析、下载、预处理并进入转写流程。你只需要等结果出来。</p>
  </section>

  <section class="shell">
    <div class="service-pill" id="servicePill">
      <span class="service-dot"></span>
      <span id="serviceText">正在检测服务状态…</span>
    </div>

    <div class="composer">
      <label class="input-wrap">
        <input id="douyinUrl" type="text" inputmode="url" placeholder="粘贴抖音分享链接，支持口令里的 http(s) 链接">
      </label>
      <button class="primary-btn" id="submitBtn" type="button">开始提取</button>
    </div>
    <div class="microcopy">默认按中文 + 平衡模式处理。提交后会自动追踪进度；如果后端没把状态同步出来，也会直接告诉你原因。</div>

    <div class="card hidden" id="progressCard">
      <div class="card-head">
        <div class="card-title" id="progressTitle">处理中</div>
        <div class="card-badge" id="phaseBadge">等待中</div>
      </div>
      <div class="progress-copy" id="progressText">任务准备中…</div>
      <div class="meta-row">
        <div class="meta-item"><div class="k">任务状态</div><div class="v" id="taskStatus">-</div></div>
        <div class="meta-item"><div class="k">当前阶段</div><div class="v" id="taskPhase">-</div></div>
        <div class="meta-item"><div class="k">队列位置</div><div class="v" id="taskQueue">-</div></div>
        <div class="meta-item"><div class="k">视频标题</div><div class="v" id="taskTitle">-</div></div>
      </div>
    </div>

    <div class="error-box hidden" id="errorBox"></div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">结果</div>
        <div class="card-badge" id="resultBadge">等待输入</div>
      </div>
      <div class="result-box" id="resultBox"><span class="result-placeholder">结果会显示在这里。</span></div>
      <div class="result-actions">
        <div class="result-note" id="resultNote">支持复制结果；失败时会尽量给出人话提示。</div>
        <div class="secondary-actions">
          <button class="ghost-btn" id="copyBtn" type="button">复制</button>
          <button class="ghost-btn" id="resetBtn" type="button">清空</button>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://api.soda567.dpdns.org';
const DEFAULT_MODE = 'balanced';
const DEFAULT_LANGUAGE = 'zh';
const STATUS_LABELS = {
  pending: '等待中',
  processing: '处理中',
  completed: '已完成',
  error: '失败'
};
const PHASE_LABELS = {
  parsing: '解析链接',
  downloading: '下载素材',
  preprocessing: '音频预处理',
  submitting: '提交转写',
  queued: '排队中',
  transcribing: '转写中',
  completed: '已完成',
  error: '失败',
  sync_failed: '状态同步失败',
  upstream_error: '上游失败'
};
const POLL_INTERVAL_MS = 2500;
const EARLY_STATUS_GRACE_MS = 18000;
const MAX_TRANSIENT_STATUS_ERRORS = 6;

let currentTaskId = '';
let pollTimer = null;
let transientStatusErrors = 0;
let taskStartedAt = 0;

const servicePill = document.getElementById('servicePill');
const serviceText = document.getElementById('serviceText');
const progressCard = document.getElementById('progressCard');
const progressTitle = document.getElementById('progressTitle');
const phaseBadge = document.getElementById('phaseBadge');
const progressText = document.getElementById('progressText');
const resultBox = document.getElementById('resultBox');
const resultBadge = document.getElementById('resultBadge');
const resultNote = document.getElementById('resultNote');
const errorBox = document.getElementById('errorBox');
const submitBtn = document.getElementById('submitBtn');
const douyinUrl = document.getElementById('douyinUrl');
const toastEl = document.getElementById('toast');

function showToast(message, type = '') {
  toastEl.textContent = message;
  toastEl.className = `toast show ${type}`.trim();
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => {
    toastEl.className = 'toast';
  }, 2200);
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function setServiceStatus(ok, text) {
  servicePill.className = `service-pill ${ok ? 'online' : 'offline'}`;
  serviceText.textContent = text;
}

async function checkServiceStatus() {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(`${API_BASE}/api/health`, { method: 'GET', mode: 'cors', signal: controller.signal });
    clearTimeout(timeoutId);
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.status === 'ok') {
      setServiceStatus(true, '服务正常，可以直接提交');
      return true;
    }
  } catch (_) {}
  setServiceStatus(false, '服务暂时不可用，当前无法正常提取');
  return false;
}
checkServiceStatus();
setInterval(checkServiceStatus, 30000);

function stopPolling() {
  if (pollTimer) {
    clearTimeout(pollTimer);
    pollTimer = null;
  }
}

function setProgressVisible(visible) {
  progressCard.classList.toggle('hidden', !visible);
}

function setError(message) {
  if (!message) {
    errorBox.classList.add('hidden');
    errorBox.textContent = '';
    return;
  }
  errorBox.classList.remove('hidden');
  errorBox.textContent = message;
}

function setResult(text, badge = '等待输入', note = '支持复制结果；失败时会尽量给出人话提示。') {
  resultBadge.textContent = badge;
  resultNote.textContent = note;
  if (!text) {
    resultBox.innerHTML = '<span class="result-placeholder">结果会显示在这里。</span>';
    return;
  }
  resultBox.textContent = text;
}

function resetMeta() {
  document.getElementById('taskStatus').textContent = '-';
  document.getElementById('taskPhase').textContent = '-';
  document.getElementById('taskQueue').textContent = '-';
  document.getElementById('taskTitle').textContent = '-';
}

function normalizeMessage(raw, fallback = '处理失败') {
  const text = String(raw || '').trim();
  if (!text) return fallback;
  if (text === '查询失败') {
    return '状态服务没有返回有效结果。任务可能刚提交成功，但进度接口暂时没接上。';
  }
  if (text.includes('Failed to fetch')) {
    return '网络连接失败，暂时连不上接口。';
  }
  if (text.includes('AbortError')) {
    return '请求超时，接口响应太慢。';
  }
  return text;
}

async function readJsonSafely(res) {
  const contentType = res.headers.get('content-type') || '';
  if (contentType.includes('application/json')) {
    return res.json().catch(() => ({}));
  }
  const text = await res.text().catch(() => '');
  return { error: text };
}

function updateMeta(data) {
  const status = data.status || '-';
  const phase = data.phase || status || '-';
  document.getElementById('taskStatus').textContent = STATUS_LABELS[status] || status;
  document.getElementById('taskPhase').textContent = `${PHASE_LABELS[phase] || phase}${phase ? ` (${phase})` : ''}`;
  document.getElementById('taskQueue').textContent = data.queue_position ?? 0;
  document.getElementById('taskTitle').textContent = data.video_title || data.filename || '-';
}

function buildProgressLines(data) {
  const lines = [];
  if (data.task_id || currentTaskId) lines.push(`任务 ID：${data.task_id || currentTaskId}`);
  if (data.source_url) lines.push(`原始链接：${data.source_url}`);
  if (data.resolved_url) lines.push(`解析后链接：${data.resolved_url}`);
  if (data.video_title) lines.push(`视频标题：${data.video_title}`);
  if ((data.queue_position ?? 0) > 0) lines.push(`队列位置：${data.queue_position}`);
  return lines.join('\n');
}

function renderTask(data) {
  const status = data.status || 'pending';
  const phase = data.phase || status || 'queued';
  const phaseLabel = PHASE_LABELS[phase] || phase;
  const statusLabel = STATUS_LABELS[status] || status;

  updateMeta(data);
  setProgressVisible(true);
  progressTitle.textContent = status === 'completed' ? '已完成' : status === 'error' ? '处理失败' : '正在处理';
  phaseBadge.textContent = phaseLabel;

  if (status === 'completed') {
    setError('');
    progressText.textContent = buildProgressLines(data) || '处理完成';
    setResult(data.result || '已完成，但当前没有返回正文内容。', '已完成', '现在可以直接复制结果。');
    return;
  }

  if (status === 'error') {
    const errorMessage = normalizeMessage(data.error, '处理失败');
    setError(errorMessage);
    progressText.textContent = buildProgressLines(data) || '任务已结束';
    setResult(errorMessage, '失败', '可以换一个链接重试，或稍后再试。');
    return;
  }

  setError('');
  progressText.textContent = buildProgressLines(data) || '任务已创建，正在推进中…';
  setResult(`正在${phaseLabel}，结果完成后会自动出现在这里。`, phaseLabel, '保持页面打开即可。');
}

function shouldTreatAsTransientStatusFailure(errorMessage) {
  const normalized = normalizeMessage(errorMessage, '状态查询失败');
  const elapsed = Date.now() - taskStartedAt;
  if (elapsed > EARLY_STATUS_GRACE_MS) return false;
  return /状态服务没有返回有效结果|网络连接失败|请求超时|404|502|503|504|查询失败|not found/i.test(normalized);
}

async function pollTask(taskId) {
  stopPolling();
  currentTaskId = taskId;
  try {
    const res = await fetch(`${API_BASE}/api/status/${encodeURIComponent(taskId)}`, { mode: 'cors' });
    const data = await readJsonSafely(res);
    if (!res.ok) {
      throw new Error(data.error || data.message || `状态查询失败：HTTP ${res.status}`);
    }

    transientStatusErrors = 0;
    renderTask({ ...data, task_id: data.task_id || taskId });

    if (data.status === 'completed' || data.status === 'error') return;
    pollTimer = setTimeout(() => pollTask(taskId), POLL_INTERVAL_MS);
  } catch (error) {
    const friendly = normalizeMessage(error.message, '状态查询失败');
    if (shouldTreatAsTransientStatusFailure(friendly) && transientStatusErrors < MAX_TRANSIENT_STATUS_ERRORS) {
      transientStatusErrors += 1;
      setProgressVisible(true);
      progressTitle.textContent = '正在接入状态';
      phaseBadge.textContent = '连接中';
      progressText.textContent = [
        `任务 ID：${taskId}`,
        '任务已经提交成功，正在等待状态服务返回进度。',
        `第 ${transientStatusErrors} 次重试中…`
      ].join('\n');
      setError('');
      setResult('任务已提交，正在连接进度服务，请稍候。', '连接中', '如果接口稍慢，页面会自动重试。');
      pollTimer = setTimeout(() => pollTask(taskId), POLL_INTERVAL_MS + transientStatusErrors * 800);
      return;
    }

    setProgressVisible(true);
    progressTitle.textContent = '状态暂不可追踪';
    phaseBadge.textContent = '需稍后重试';
    progressText.textContent = `任务 ID：${taskId}\n提交已经发出，但页面暂时拿不到后续状态。`;
    setError(`${friendly}\n\n如果你是刚提交就看到这个提示，通常不是链接有问题，而是状态服务没及时同步出来。可稍后重试，或把任务 ID 发给管理员排查。`);
    setResult(`任务已提交，但当前无法继续追踪进度。\n任务 ID：${taskId}`, '状态异常', '建议稍后再试；如果持续出现，请排查后端状态同步。');
  }
}

async function startSubmit() {
  const url = douyinUrl.value.trim();
  if (!url) {
    setError('请先粘贴抖音链接。');
    douyinUrl.focus();
    return;
  }

  stopPolling();
  currentTaskId = '';
  transientStatusErrors = 0;
  taskStartedAt = Date.now();
  resetMeta();
  setError('');
  setProgressVisible(true);
  progressTitle.textContent = '正在提交';
  phaseBadge.textContent = '准备中';
  progressText.textContent = '正在把链接交给后端…';
  setResult('任务准备中，稍等一下。', '提交中', '提交成功后会自动进入进度追踪。');
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中…';

  try {
    const res = await fetch(`${API_BASE}/api/transcribe/douyin`, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        mode: DEFAULT_MODE,
        language: DEFAULT_LANGUAGE
      })
    });
    const data = await readJsonSafely(res);
    if (!res.ok) {
      throw new Error(data.error || data.message || `请求失败：HTTP ${res.status}`);
    }
    if (!data.task_id) {
      throw new Error('接口已接收请求，但没有返回 task_id，当前无法继续追踪结果。');
    }

    renderTask(data);
    await pollTask(data.task_id);
  } catch (error) {
    const friendly = normalizeMessage(error.message, '启动失败');
    progressTitle.textContent = '无法开始';
    phaseBadge.textContent = '失败';
    progressText.textContent = '这次请求没有成功进入处理流程。';
    setError(friendly);
    setResult(friendly, '启动失败', '请检查链接是否完整，或稍后再试。');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '开始提取';
  }
}

submitBtn.addEventListener('click', startSubmit);
douyinUrl.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    event.preventDefault();
    startSubmit();
  }
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = resultBox.textContent.trim();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    showToast('已复制', 'ok');
  } catch (error) {
    setError(`复制失败：${normalizeMessage(error.message, '请手动复制')}`);
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  stopPolling();
  currentTaskId = '';
  transientStatusErrors = 0;
  taskStartedAt = 0;
  douyinUrl.value = '';
  resetMeta();
  setProgressVisible(false);
  setError('');
  setResult('', '等待输入', '支持复制结果；失败时会尽量给出人话提示。');
  douyinUrl.focus();
});
</script>
</body>
</html>
