<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音链接转文案 | SODA567</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface-soft: rgba(255,255,255,0.03);
  --gold: #ffd700;
  --text: #e8e8e8;
  --muted: #666;
  --muted-soft: rgba(232,232,232,0.52);
  --border: #222;
  --success: #5ad060;
  --danger: #ff6b6b;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 200;
  min-height: 100vh;
}
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 48px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-size: 1.2rem;
  color: var(--text);
  font-weight: 300;
  text-decoration: none;
  letter-spacing: 1px;
}
.nav-back {
  padding: 10px 20px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 300;
  letter-spacing: 1px;
  transition: all 0.3s;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--text);
}
.nav-back:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 80px 48px 96px;
}
.page-title {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 200;
  letter-spacing: -2px;
  margin-bottom: 16px;
}
.page-desc {
  color: var(--muted);
  font-size: .95rem;
  margin-bottom: 40px;
  line-height: 1.8;
  max-width: 560px;
}
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 0.85rem;
}
.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #666;
  transition: background 0.3s;
  flex: 0 0 auto;
}
.status-dot.online { background: #5ad060; box-shadow: 0 0 6px rgba(90,208,96,0.5); }
.status-dot.offline { background: #e05050; box-shadow: 0 0 6px rgba(224,80,80,0.5); }
.status-text { color: var(--muted); }
.status-text.online { color: #5ad060; }
.status-text.offline { color: #e05050; }
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}
.input-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
}
.url-input {
  width: 100%;
  height: 54px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #101010;
  color: var(--text);
  padding: 0 16px;
  font-size: 0.95rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.url-input::placeholder { color: rgba(232,232,232,0.32); }
.url-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(255,215,0,0.08);
}
.btn {
  padding: 14px 28px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 300;
  font-size: 0.9rem;
  transition: all 0.3s;
  cursor: pointer;
  border: none;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
}
.btn-primary { background: var(--gold); color: var(--bg); }
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255,215,0,0.3);
}
.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) {
  border-color: var(--text);
  transform: translateY(-2px);
}
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-ghost:hover:not(:disabled) {
  color: var(--text);
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-2px);
}
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }
.helper-text {
  margin-top: 12px;
  color: var(--muted);
  font-size: 0.84rem;
}
.progress-card,
.result-card,
.error-box {
  margin-top: 18px;
}
.hidden { display: none !important; }
.progress-card,
.result-card {
  background: #111;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
}
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.card-title {
  font-size: 1rem;
  font-weight: 300;
  color: var(--text);
}
.card-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  max-width: 100%;
  min-height: 34px;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--muted-soft);
  background: rgba(255,255,255,0.02);
  font-size: 0.8rem;
  line-height: 1.4;
  white-space: normal;
  overflow-wrap: anywhere;
}
.progress-main {
  display: grid;
  gap: 12px;
}
.progress-current {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.progress-phase-label {
  font-size: 1.05rem;
  font-weight: 300;
  color: var(--text);
}
.progress-percent {
  color: var(--gold);
  font-size: 1.1rem;
  font-weight: 400;
}
.progress-track {
  width: 100%;
  height: 10px;
  background: #222;
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #ffed4a);
  border-radius: inherit;
  transition: width .28s ease;
}
.progress-steps {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.progress-step {
  padding-top: 10px;
  border-top: 1px solid #242424;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.5;
  min-width: 0;
}
.progress-step.active,
.progress-step.done {
  border-top-color: rgba(255,215,0,0.55);
  color: var(--text);
}
.progress-step.done { color: #d5d5d5; }
.progress-detail {
  color: var(--muted);
  font-size: 0.86rem;
  line-height: 1.75;
}
.meta-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.meta-item {
  min-width: 0;
  padding: 14px;
  border-radius: 10px;
  background: var(--surface-soft);
  border: 1px solid rgba(255,255,255,0.04);
}
.meta-label {
  color: var(--muted);
  font-size: 0.72rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.meta-value {
  color: var(--text);
  font-size: 0.88rem;
  line-height: 1.65;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.result-box {
  min-height: 220px;
  padding: 18px;
  border-radius: 10px;
  background: #101010;
  border: 1px solid var(--border);
  color: var(--text);
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
  line-height: 1.9;
  font-size: 0.92rem;
}
.result-placeholder { color: var(--muted); }
.result-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.result-note {
  color: var(--muted);
  font-size: 0.82rem;
  line-height: 1.6;
}
.btn-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.error-box {
  padding: 16px;
  background: rgba(123, 24, 24, 0.22);
  border: 1px solid rgba(255, 107, 107, 0.24);
  border-radius: 12px;
  color: #ff8b8b;
  line-height: 1.7;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.toast {
  position: fixed;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%) translateY(16px);
  opacity: 0;
  pointer-events: none;
  transition: all .18s ease;
  padding: 12px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(14,14,14,0.94);
  color: var(--text);
  font-size: 13px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: rgba(90,208,96,0.28); color: var(--success); }
.toast.err { border-color: rgba(255,107,107,0.28); color: var(--danger); }
@media (max-width: 768px) {
  nav { padding-left: 24px; padding-right: 24px; }
  .container { padding: 60px 24px 72px; }
  .panel { padding: 18px; }
  .input-row { grid-template-columns: 1fr; }
  .btn-primary { width: 100%; }
  .progress-steps,
  .meta-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 560px) {
  .progress-steps,
  .meta-grid { grid-template-columns: 1fr; }
  .btn-group { width: 100%; }
  .btn-group .btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>
<nav>
  <a href="../index.html" class="logo" style="display:flex;align-items:center;gap:8px;text-decoration:none;line-height:1;">
    <img src="../images/logo-icon.png" style="height:52px;width:auto;border-radius:4px;">
    <div style="display:flex;flex-direction:column;justify-content:center;">
      <span style="font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:-0.5px;color:#fff;font-size:1.2em;">soda</span>
      <span style="font-weight:200;font-family:'DM Sans',sans-serif;letter-spacing:3.5px;font-size:0.65em;opacity:0.8;color:#fff;margin-top:2px;">MEDIA</span>
    </div>
  </a>
  <a href="index.html" class="nav-back">返回工具页</a>
</nav>

<div class="container">
  <h1 class="page-title">抖音链接转文案</h1>
  <p class="page-desc">粘贴抖音分享链接，系统会自动解析、抓取并转成文案。你只需要等结果出来。</p>

  <div class="status-bar" id="servicePill">
    <div class="status-dot" id="serviceDot"></div>
    <span class="status-text" id="serviceText">检测后端服务中...</span>
  </div>

  <section class="panel">
    <div class="input-row">
      <input id="douyinUrl" class="url-input" type="text" inputmode="url" placeholder="粘贴抖音分享链接，支持口令中的 http(s) 链接">
      <button class="btn btn-primary" id="submitBtn" type="button">开始提取</button>
    </div>
    <div class="helper-text">默认按中文处理，提交后会自动追踪进度。</div>

    <div class="progress-card hidden" id="progressCard">
      <div class="card-head">
        <div class="card-title" id="progressTitle">处理中</div>
        <div class="card-badge" id="phaseBadge">准备中</div>
      </div>

      <div class="progress-main">
        <div class="progress-current">
          <div class="progress-phase-label" id="progressPhaseLabel">正在准备任务</div>
          <div class="progress-percent" id="progressPercent">0%</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-steps">
          <div class="progress-step" id="stepParsing">解析链接</div>
          <div class="progress-step" id="stepDownloading">获取视频</div>
          <div class="progress-step" id="stepTranscribing">转写中</div>
          <div class="progress-step" id="stepCompleted">已完成</div>
        </div>
        <div class="progress-detail" id="progressText">任务准备中...</div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">任务状态</div>
            <div class="meta-value" id="taskStatus">-</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">当前阶段</div>
            <div class="meta-value" id="taskPhase">-</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">视频标题</div>
            <div class="meta-value" id="taskTitle">-</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">任务 ID</div>
            <div class="meta-value" id="taskIdMeta">-</div>
          </div>
        </div>
      </div>
    </div>

    <div class="error-box hidden" id="errorBox"></div>

    <div class="result-card">
      <div class="card-head">
        <div class="card-title">结果</div>
        <div class="card-badge" id="resultBadge">等待输入</div>
      </div>
      <div class="result-box" id="resultBox"><span class="result-placeholder">结果会显示在这里。</span></div>
      <div class="result-actions">
        <div class="result-note" id="resultNote">完成后可直接复制文案。</div>
        <div class="btn-group">
          <button class="btn btn-secondary" id="copyBtn" type="button">复制</button>
          <button class="btn btn-ghost" id="resetBtn" type="button">清空</button>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://api.soda567.dpdns.org';
const DEFAULT_MODE = 'balanced';
const DEFAULT_LANGUAGE = 'zh';
const STATUS_LABELS = {
  pending: '等待中',
  processing: '处理中',
  completed: '已完成',
  error: '失败'
};
const PHASE_LABELS = {
  parsing: '解析链接',
  downloading: '获取视频',
  preprocessing: '整理音频',
  submitting: '提交转写',
  queued: '排队中',
  transcribing: '转写中',
  completed: '已完成',
  error: '失败',
  sync_failed: '状态同步失败',
  upstream_error: '上游失败'
};
const POLL_INTERVAL_MS = 2500;
const EARLY_STATUS_GRACE_MS = 18000;
const MAX_TRANSIENT_STATUS_ERRORS = 6;
const STEP_ORDER = ['parsing', 'downloading', 'transcribing', 'completed'];
const STEP_CONFIG = {
  parsing: { percent: 20, label: '正在解析链接' },
  downloading: { percent: 42, label: '正在获取视频' },
  preprocessing: { percent: 56, label: '正在整理音频' },
  submitting: { percent: 68, label: '正在提交转写' },
  queued: { percent: 76, label: '正在排队' },
  transcribing: { percent: 88, label: '正在转写' },
  completed: { percent: 100, label: '已完成' },
  error: { percent: 100, label: '处理失败' },
  sync_failed: { percent: 76, label: '状态同步失败' },
  upstream_error: { percent: 100, label: '上游失败' },
  pending: { percent: 10, label: '任务准备中' },
  processing: { percent: 60, label: '正在处理' }
};

let currentTaskId = '';
let pollTimer = null;
let transientStatusErrors = 0;
let taskStartedAt = 0;

const servicePill = document.getElementById('servicePill');
const serviceDot = document.getElementById('serviceDot');
const serviceText = document.getElementById('serviceText');
const progressCard = document.getElementById('progressCard');
const progressTitle = document.getElementById('progressTitle');
const phaseBadge = document.getElementById('phaseBadge');
const progressText = document.getElementById('progressText');
const progressPhaseLabel = document.getElementById('progressPhaseLabel');
const progressPercent = document.getElementById('progressPercent');
const progressFill = document.getElementById('progressFill');
const resultBox = document.getElementById('resultBox');
const resultBadge = document.getElementById('resultBadge');
const resultNote = document.getElementById('resultNote');
const errorBox = document.getElementById('errorBox');
const submitBtn = document.getElementById('submitBtn');
const douyinUrl = document.getElementById('douyinUrl');
const toastEl = document.getElementById('toast');
const taskStatusEl = document.getElementById('taskStatus');
const taskPhaseEl = document.getElementById('taskPhase');
const taskTitleEl = document.getElementById('taskTitle');
const taskIdMetaEl = document.getElementById('taskIdMeta');
const stepEls = {
  parsing: document.getElementById('stepParsing'),
  downloading: document.getElementById('stepDownloading'),
  transcribing: document.getElementById('stepTranscribing'),
  completed: document.getElementById('stepCompleted')
};

function showToast(message, type = '') {
  toastEl.textContent = message;
  toastEl.className = `toast show ${type}`.trim();
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => {
    toastEl.className = 'toast';
  }, 2200);
}

function setServiceStatus(ok, text) {
  servicePill.className = 'status-bar';
  serviceDot.className = `status-dot ${ok ? 'online' : 'offline'}`;
  serviceText.className = `status-text ${ok ? 'online' : 'offline'}`;
  serviceText.textContent = text;
}

async function checkServiceStatus() {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000);
    const res = await fetch(`${API_BASE}/api/health`, { method: 'GET', mode: 'cors', signal: controller.signal });
    clearTimeout(timeoutId);
    const data = await res.json().catch(() => ({}));
    if (res.ok && data.status === 'ok') {
      setServiceStatus(true, '后端服务正常运行');
      return true;
    }
  } catch (_) {}
  setServiceStatus(false, '后端服务暂不可用');
  return false;
}
checkServiceStatus();
setInterval(checkServiceStatus, 30000);

function stopPolling() {
  if (pollTimer) {
    clearTimeout(pollTimer);
    pollTimer = null;
  }
}

function setProgressVisible(visible) {
  progressCard.classList.toggle('hidden', !visible);
}

function setError(message) {
  if (!message) {
    errorBox.classList.add('hidden');
    errorBox.textContent = '';
    return;
  }
  errorBox.classList.remove('hidden');
  errorBox.textContent = message;
}

function setResult(text, badge = '等待输入', note = '完成后可直接复制文案。') {
  resultBadge.textContent = badge;
  resultNote.textContent = note;
  if (!text) {
    resultBox.innerHTML = '<span class="result-placeholder">结果会显示在这里。</span>';
    return;
  }
  resultBox.textContent = text;
}

function resetMeta() {
  taskStatusEl.textContent = '-';
  taskPhaseEl.textContent = '-';
  taskTitleEl.textContent = '-';
  taskIdMetaEl.textContent = '-';
}

function normalizeMessage(raw, fallback = '处理失败') {
  const text = String(raw || '').trim();
  if (!text) return fallback;
  if (text === '查询失败') return '状态服务暂时没有返回有效结果。';
  if (text.includes('Failed to fetch')) return '网络连接失败，暂时连不上接口。';
  if (text.includes('AbortError')) return '请求超时，接口响应太慢。';
  return text;
}

async function readJsonSafely(res) {
  const contentType = res.headers.get('content-type') || '';
  if (contentType.includes('application/json')) {
    return res.json().catch(() => ({}));
  }
  const text = await res.text().catch(() => '');
  return { error: text };
}

function getDisplayPhase(status, phase) {
  const normalizedPhase = String(phase || '').toLowerCase();
  const normalizedStatus = String(status || '').toLowerCase();
  if (normalizedStatus === 'completed') return 'completed';
  if (normalizedStatus === 'error') return normalizedPhase || 'error';
  if (['parsing'].includes(normalizedPhase)) return 'parsing';
  if (['downloading'].includes(normalizedPhase)) return 'downloading';
  if (['preprocessing', 'submitting', 'queued', 'transcribing'].includes(normalizedPhase)) return normalizedPhase;
  if (normalizedStatus === 'pending') return 'pending';
  if (normalizedStatus === 'processing') return normalizedPhase || 'processing';
  return normalizedPhase || normalizedStatus || 'pending';
}

function getProgressState(status, phase) {
  const displayPhase = getDisplayPhase(status, phase);
  return STEP_CONFIG[displayPhase] || STEP_CONFIG.pending;
}

function updateProgressUI(status, phase) {
  const displayPhase = getDisplayPhase(status, phase);
  const state = getProgressState(status, phase);
  const activeIndex = displayPhase === 'completed' ? STEP_ORDER.length - 1 :
    displayPhase === 'downloading' ? 1 :
    ['preprocessing', 'submitting', 'queued', 'transcribing'].includes(displayPhase) ? 2 : 0;

  progressPhaseLabel.textContent = state.label;
  progressPercent.textContent = `${state.percent}%`;
  progressFill.style.width = `${state.percent}%`;

  STEP_ORDER.forEach((step, index) => {
    const el = stepEls[step];
    el.classList.remove('active', 'done');
    if (index < activeIndex) el.classList.add('done');
    if (index === activeIndex) el.classList.add(displayPhase === 'completed' ? 'done' : 'active');
    if (displayPhase === 'completed' && index <= activeIndex) el.classList.add('done');
  });
}

function updateMeta(data) {
  const status = data.status || '-';
  const phase = data.phase || status || '-';
  taskStatusEl.textContent = STATUS_LABELS[status] || status;
  taskPhaseEl.textContent = `${PHASE_LABELS[phase] || phase}${phase ? ` (${phase})` : ''}`;
  taskTitleEl.textContent = data.video_title || data.filename || '-';
  taskIdMetaEl.textContent = data.task_id || currentTaskId || '-';
}

function buildProgressCopy(data) {
  const phase = getDisplayPhase(data.status, data.phase);
  const queueText = (data.queue_position ?? 0) > 0 ? `当前前面还有 ${data.queue_position} 个任务。` : '';
  const titleText = data.video_title ? `视频标题：${data.video_title}` : '';

  if (data.status === 'completed') {
    return titleText || '文案已经准备好。';
  }
  if (data.status === 'error') {
    return titleText || '任务已结束。';
  }
  if (phase === 'parsing') return '正在识别并清洗链接。';
  if (phase === 'downloading') return '正在获取视频内容，请稍候。';
  if (['preprocessing', 'submitting'].includes(phase)) return '正在整理素材并准备转写。';
  if (phase === 'queued') return queueText || '任务已进入队列，马上开始。';
  if (phase === 'transcribing') return '正在转写文案，完成后会自动显示结果。';
  return '任务已经创建，正在推进中。';
}

function renderTask(data) {
  const status = data.status || 'pending';
  const phase = data.phase || status || 'pending';
  const phaseLabel = PHASE_LABELS[phase] || phase;
  const statusLabel = STATUS_LABELS[status] || status;

  updateMeta(data);
  updateProgressUI(status, phase);
  setProgressVisible(true);
  progressTitle.textContent = status === 'completed' ? '已完成' : status === 'error' ? '处理失败' : '处理中';
  phaseBadge.textContent = phaseLabel;
  progressText.textContent = buildProgressCopy(data);

  if (status === 'completed') {
    setError('');
    setResult(data.result || '已完成，但当前没有返回正文内容。', '已完成', '现在可以直接复制结果。');
    return;
  }

  if (status === 'error') {
    const errorMessage = normalizeMessage(data.error, '处理失败');
    setError(errorMessage);
    setResult(errorMessage, '失败', '可以换一个链接重试，或稍后再试。');
    return;
  }

  setError('');
  setResult('处理中，完成后结果会自动显示在这里。', phaseLabel, '保持页面打开即可。');
}

function shouldTreatAsTransientStatusFailure(errorMessage) {
  const normalized = normalizeMessage(errorMessage, '状态查询失败');
  const elapsed = Date.now() - taskStartedAt;
  if (elapsed > EARLY_STATUS_GRACE_MS) return false;
  return /状态服务暂时没有返回有效结果|网络连接失败|请求超时|404|502|503|504|查询失败|not found/i.test(normalized);
}

async function pollTask(taskId) {
  stopPolling();
  currentTaskId = taskId;
  try {
    const res = await fetch(`${API_BASE}/api/status/${encodeURIComponent(taskId)}`, { mode: 'cors' });
    const data = await readJsonSafely(res);
    if (!res.ok) {
      throw new Error(data.error || data.message || `状态查询失败：HTTP ${res.status}`);
    }

    transientStatusErrors = 0;
    renderTask({ ...data, task_id: data.task_id || taskId });

    if (data.status === 'completed' || data.status === 'error') return;
    pollTimer = setTimeout(() => pollTask(taskId), POLL_INTERVAL_MS);
  } catch (error) {
    const friendly = normalizeMessage(error.message, '状态查询失败');
    if (shouldTreatAsTransientStatusFailure(friendly) && transientStatusErrors < MAX_TRANSIENT_STATUS_ERRORS) {
      transientStatusErrors += 1;
      setProgressVisible(true);
      progressTitle.textContent = '正在接入状态';
      phaseBadge.textContent = '连接中';
      progressPhaseLabel.textContent = '正在连接进度服务';
      progressPercent.textContent = '12%';
      progressFill.style.width = '12%';
      progressText.textContent = `任务已经提交成功，正在等待进度返回（第 ${transientStatusErrors} 次重试）。`;
      setError('');
      setResult('任务已提交，正在连接进度服务，请稍候。', '连接中', '如果接口稍慢，页面会自动重试。');
      pollTimer = setTimeout(() => pollTask(taskId), POLL_INTERVAL_MS + transientStatusErrors * 800);
      return;
    }

    setProgressVisible(true);
    progressTitle.textContent = '状态暂不可追踪';
    phaseBadge.textContent = '需稍后重试';
    progressPhaseLabel.textContent = '任务已提交';
    progressPercent.textContent = '20%';
    progressFill.style.width = '20%';
    progressText.textContent = `任务 ID：${taskId}。提交已经发出，但页面暂时拿不到后续状态。`;
    setError(`${friendly}\n\n如果你是刚提交就看到这个提示，通常不是链接有问题，而是状态服务没及时同步出来。可稍后重试，或把任务 ID 发给管理员排查。`);
    setResult(`任务已提交，但当前无法继续追踪进度。\n任务 ID：${taskId}`, '状态异常', '建议稍后再试；如果持续出现，请排查后端状态同步。');
  }
}

async function startSubmit() {
  const url = douyinUrl.value.trim();
  if (!url) {
    setError('请先粘贴抖音链接。');
    douyinUrl.focus();
    return;
  }

  stopPolling();
  currentTaskId = '';
  transientStatusErrors = 0;
  taskStartedAt = Date.now();
  resetMeta();
  setError('');
  setProgressVisible(true);
  progressTitle.textContent = '正在提交';
  phaseBadge.textContent = '准备中';
  progressPhaseLabel.textContent = '正在提交链接';
  progressPercent.textContent = '8%';
  progressFill.style.width = '8%';
  progressText.textContent = '正在把链接交给后端...';
  setResult('任务准备中，稍等一下。', '提交中', '提交成功后会自动进入进度追踪。');
  submitBtn.disabled = true;
  submitBtn.textContent = '提交中...';

  try {
    const res = await fetch(`${API_BASE}/api/transcribe/douyin`, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url,
        mode: DEFAULT_MODE,
        language: DEFAULT_LANGUAGE
      })
    });
    const data = await readJsonSafely(res);
    if (!res.ok) {
      throw new Error(data.error || data.message || `请求失败：HTTP ${res.status}`);
    }
    if (!data.task_id) {
      throw new Error('接口已接收请求，但没有返回 task_id，当前无法继续追踪结果。');
    }

    renderTask(data);
    await pollTask(data.task_id);
  } catch (error) {
    const friendly = normalizeMessage(error.message, '启动失败');
    progressTitle.textContent = '无法开始';
    phaseBadge.textContent = '失败';
    progressPhaseLabel.textContent = '启动失败';
    progressPercent.textContent = '100%';
    progressFill.style.width = '100%';
    progressText.textContent = '这次请求没有成功进入处理流程。';
    setError(friendly);
    setResult(friendly, '启动失败', '请检查链接是否完整，或稍后再试。');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '开始提取';
  }
}

submitBtn.addEventListener('click', startSubmit);
douyinUrl.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    event.preventDefault();
    startSubmit();
  }
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = resultBox.textContent.trim();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    showToast('已复制', 'ok');
  } catch (error) {
    setError(`复制失败：${normalizeMessage(error.message, '请手动复制')}`);
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  stopPolling();
  currentTaskId = '';
  transientStatusErrors = 0;
  taskStartedAt = 0;
  douyinUrl.value = '';
  resetMeta();
  setProgressVisible(false);
  setError('');
  setResult('', '等待输入', '完成后可直接复制文案。');
  progressPhaseLabel.textContent = '正在准备任务';
  progressPercent.textContent = '0%';
  progressFill.style.width = '0%';
  Object.values(stepEls).forEach((el) => el.classList.remove('active', 'done'));
  douyinUrl.focus();
});
</script>
