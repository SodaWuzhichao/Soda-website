<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>链接转二维码 | SODA567</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --gold: #ffd700;
  --text: #e8e8e8; --muted: #666; --border: #222;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 200; min-height: 100vh; }

nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 48px; border-bottom: 1px solid var(--border);
}
.logo { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; color: var(--text); text-decoration: none; }
.nav-back {
  padding: 10px 20px; border-radius: 6px; text-decoration: none;
  font-size: 0.85rem; font-weight: 300; letter-spacing: 1px;
  transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: var(--text);
}
.nav-back:hover { border-color: var(--gold); color: var(--gold); }

.container { max-width: 520px; margin: 0 auto; padding: 60px 24px 100px; }

.section-label { font-size: .7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
.page-title { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 200; letter-spacing: -1px; margin-bottom: 12px; }
.page-desc { color: var(--muted); font-size: .9rem; margin-bottom: 48px; }

.input-group { position: relative; margin-bottom: 20px; }
.url-input {
  width: 100%; padding: 16px 20px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 1rem; font-family: inherit; font-weight: 200;
  outline: none; transition: border-color 0.3s;
}
.url-input:focus { border-color: var(--gold); }
.url-input::placeholder { color: #444; }

.btn-generate {
  width: 100%; padding: 16px; border-radius: 10px; border: none;
  background: var(--gold); color: #0a0a0a; font-size: 1rem;
  font-family: inherit; font-weight: 400; cursor: pointer;
  transition: all 0.3s; letter-spacing: 1px;
}
.btn-generate:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-generate:active { transform: translateY(0); }

.qr-section { margin-top: 48px; text-align: center; display: none; }
.qr-section.show { display: block; }

.qr-wrapper {
  display: inline-block; padding: 24px; border-radius: 16px;
  background: #fff; margin-bottom: 24px;
}
#qrcode { display: flex; justify-content: center; }
#qrcode img { border-radius: 4px; }

.btn-download {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text); font-size: 0.9rem;
  font-family: inherit; font-weight: 300; cursor: pointer;
  transition: all 0.3s; text-decoration: none;
}
.btn-download:hover { border-color: var(--gold); color: var(--gold); }

.hint {
  margin-top: 32px; padding: 16px 20px; border-radius: 8px;
  background: rgba(255,215,0,0.05); border: 1px solid rgba(255,215,0,0.1);
  color: var(--muted); font-size: 0.8rem; line-height: 1.6;
}
.hint span { color: var(--gold); }

.error-msg {
  color: #ff6b6b; font-size: 0.85rem; margin-top: 8px;
  display: none;
}
.error-msg.show { display: block; }

@media (max-width: 600px) {
  nav { padding: 20px 20px; }
  .container { padding: 40px 20px 80px; }
}
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">SODA</a>
  <a href="../index.html" class="nav-back">← 返回</a>
</nav>

<div class="container">
  <div class="section-label">QR Code Generator</div>
  <h1 class="page-title">链接转二维码</h1>
  <p class="page-desc">粘贴任意链接，一键生成二维码，扫码直达</p>

  <div class="input-group">
    <input type="url" class="url-input" id="urlInput" placeholder="https://live.weixin.qq.com/..." autocomplete="off">
    <div class="error-msg" id="errorMsg">请输入有效的链接地址</div>
  </div>

  <button class="btn-generate" id="genBtn">生成二维码</button>

  <div class="qr-section" id="qrSection">
    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>
    <br>
    <button class="btn-download" id="dlBtn">⬇ 下载二维码</button>
    <div class="hint">
      <span>💡 提示</span><br>
      支持任意网址（视频号 / 抖音 / B站 / YouTube 等）<br>
      微信扫码即可在浏览器中打开链接
    </div>
  </div>
</div>

<script>
const urlInput = document.getElementById('urlInput');
const genBtn = document.getElementById('genBtn');
const qrSection = document.getElementById('qrSection');
const dlBtn = document.getElementById('dlBtn');
const errorMsg = document.getElementById('errorMsg');
const qrContainer = document.getElementById('qrcode');
let qrInstance = null;

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

function generate() {
  const url = urlInput.value.trim();
  if (!url || !isValidUrl(url)) {
    errorMsg.classList.add('show');
    qrSection.classList.remove('show');
    return;
  }
  errorMsg.classList.remove('show');

  qrContainer.innerHTML = '';
  qrInstance = new QRCode(qrContainer, {
    text: url,
    width: 300,
    height: 300,
    colorDark: '#1a1a1a',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  qrSection.classList.add('show');
  qrSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

genBtn.addEventListener('click', generate);
urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });

dlBtn.addEventListener('click', () => {
  const canvas = qrContainer.querySelector('canvas');
  if (!canvas) {
    const img = qrContainer.querySelector('img');
    if (img) {
      const a = document.createElement('a');
      a.href = img.src; a.download = 'qrcode.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
    return;
  }
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url; a.download = 'qrcode.png';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
});
</script>
</body>
</html>
