<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转文案测试页 | SODA567</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--gold:#ffd700;--text:#e8e8e8;--muted:#777;--border:#262626;--danger:#ff6666;--ok:#5ad060}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
.container{max-width:920px;margin:0 auto;padding:40px 24px 80px}
h1{font-weight:300;letter-spacing:-1px;margin:0 0 10px} p{color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:18px}
.row{display:flex;gap:16px;flex-wrap:wrap;align-items:center}.row>*{min-width:0}
input[type=file],select,button{font:inherit} select,button{background:#111;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 14px}
button{cursor:pointer} button.primary{background:var(--gold);color:#111;border-color:var(--gold);font-weight:400} button:disabled{opacity:.5;cursor:not-allowed}
.progress{height:12px;background:#222;border-radius:999px;overflow:hidden;margin-top:12px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#ffee74);transition:width .25s}
.meta{display:grid;grid-template-columns:140px 1fr;gap:10px 14px;font-size:14px;margin-top:14px}.meta div:nth-child(odd){color:var(--muted)}
.pre,.result{white-space:pre-wrap;word-break:break-word;background:#101010;border:1px solid var(--border);border-radius:10px;padding:14px;line-height:1.7}
.error{color:var(--danger)} .ok{color:var(--ok)} .hint{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
  <h1>转文案测试页</h1>
  <p>仅用于大文件长期主义改造测试。正式页 <code>transcribe.html</code> 未改动。</p>

  <div class="card">
    <div class="row">
      <input id="fileInput" type="file" accept="video/*,audio/*">
      <select id="langSelect">
        <option value="zh" selected>中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="auto">自动检测</option>
      </select>
      <button class="primary" id="startBtn">开始测试上传</button>
      <button id="resetBtn">重置</button>
    </div>
    <div class="hint" style="margin-top:12px">分片上传到 <code>/api/transcribe/upload_chunk</code>，合并完成后调用 <code>/api/transcribe/complete</code>，再轮询 <code>/api/status/&lt;task_id&gt;</code>。</div>

    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="meta">
      <div>当前阶段</div><div id="phase">未开始</div>
      <div>进度</div><div id="pct">0%</div>
      <div>任务 ID</div><div id="taskId">-</div>
      <div>上游任务 ID</div><div id="upstreamTaskId">-</div>
      <div>队列位置</div><div id="queuePos">-</div>
      <div>文件信息</div><div id="fileMeta">-</div>
    </div>
  </div>

  <div class="card">
    <div style="margin-bottom:10px">日志</div>
    <div class="pre" id="log"></div>
  </div>

  <div class="card">
    <div style="margin-bottom:10px">结果</div>
    <div class="result" id="result">（暂无结果）</div>
  </div>
</div>
<script>
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://127.0.0.1:5001' : 'https://api.soda567.dpdns.org';
const CHUNK_SIZE = 8 * 1024 * 1024;
const POLL_MS = 2000;
let polling = null;

const $ = (id) => document.getElementById(id);
const log = (msg) => {
  const now = new Date().toLocaleTimeString('zh-CN', {hour12:false});
  $('log').textContent += `[${now}] ${msg}\n`;
  $('log').scrollTop = $('log').scrollHeight;
};
const setBar = (n, phase='') => {
  const pct = Math.max(0, Math.min(100, n));
  $('bar').style.width = pct + '%';
  $('pct').textContent = Math.round(pct) + '%';
  if (phase) $('phase').textContent = phase;
};
const setMeta = (key, value) => $(key).textContent = value ?? '-';

function resetUI() {
  if (polling) clearInterval(polling);
  polling = null;
  $('result').textContent = '（暂无结果）';
  $('log').textContent = '';
  setBar(0, '未开始');
  setMeta('taskId', '-');
  setMeta('upstreamTaskId', '-');
  setMeta('queuePos', '-');
  setMeta('fileMeta', '-');
}

async function uploadChunk(file, fileId, idx, total) {
  const start = idx * CHUNK_SIZE;
  const end = Math.min(file.size, start + CHUNK_SIZE);
  const blob = file.slice(start, end);
  const fd = new FormData();
  fd.append('file', blob, file.name + `.part${idx}`);
  fd.append('file_id', fileId);
  fd.append('part_index', String(idx));
  fd.append('total_parts', String(total));
  fd.append('filename', file.name);
  const res = await fetch(API_BASE + '/api/transcribe/upload_chunk', { method: 'POST', body: fd });
  const data = await res.json();
  if (!res.ok || data.status !== 'ok') throw new Error(data.message || data.error || `分片 ${idx+1} 上传失败`);
  return {start, end, data};
}

async function completeUpload(file, fileId, language) {
  const res = await fetch(API_BASE + '/api/transcribe/complete', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      file_id: fileId,
      filename: file.name,
      content_type: file.type || '',
      language,
    })
  });
  const data = await res.json();
  if (!res.ok || !data.task_id) throw new Error(data.error || 'complete 未返回 task_id');
  return data;
}

async function fetchStatus(taskId) {
  const res = await fetch(API_BASE + '/api/status/' + encodeURIComponent(taskId));
  const data = await res.json();
  if (!res.ok && data.status !== 'error') throw new Error(data.error || '状态查询失败');
  return data;
}

function startPolling(taskId) {
  let visual = 72;
  polling = setInterval(async () => {
    try {
      const data = await fetchStatus(taskId);
      setMeta('upstreamTaskId', data.upstream_task_id || '-');
      setMeta('queuePos', String(data.queue_position ?? '-'));
      const phaseMap = {
        queued: '排队中',
        preprocessing: '媒体预处理中',
        submitting: '提交到 Whisper 队列中',
        transcribing: 'Whisper 转写中',
        completed: '完成',
        failed: '失败',
        upstream_error: '上游失败',
        sync_failed: '同步状态失败'
      };
      $('phase').textContent = phaseMap[data.phase] || data.phase || data.status || '处理中';

      if (data.status === 'completed') {
        clearInterval(polling); polling = null;
        setBar(100, '完成');
        $('result').textContent = data.result || '（空结果）';
        log('任务完成，已拿到转写结果。');
        return;
      }
      if (data.status === 'error') {
        clearInterval(polling); polling = null;
        setBar(100, '失败');
        $('result').innerHTML = `<span class="error">${data.error || '未知错误'}</span>`;
        log('任务失败：' + (data.error || '未知错误'));
        return;
      }
      if (data.phase === 'preprocessing') visual = Math.max(78, visual);
      else if (data.phase === 'submitting') visual = Math.max(84, visual);
      else if (data.phase === 'queued') visual = Math.min(90, visual + 1.5);
      else if (data.phase === 'transcribing' || data.status === 'processing') visual = Math.min(97, visual + 2.2);
      setBar(visual);
      log(`状态：${data.status} / ${data.phase || '-'} / queue=${data.queue_position ?? '-'}`);
    } catch (err) {
      log('轮询异常：' + err.message);
    }
  }, POLL_MS);
}

$('startBtn').addEventListener('click', async () => {
  const file = $('fileInput').files[0];
  if (!file) { alert('先选文件'); return; }
  resetUI();
  $('startBtn').disabled = true;
  const language = $('langSelect').value;
  const fileId = 'test_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  const total = Math.ceil(file.size / CHUNK_SIZE);
  setMeta('fileMeta', `${file.name} / ${(file.size/1024/1024).toFixed(1)} MB / ${total} 片`);
  log(`开始上传：${file.name}，共 ${total} 片`);
  try {
    for (let i = 0; i < total; i++) {
      setBar((i / total) * 60, `上传分片 ${i+1}/${total}`);
      const {start, end} = await uploadChunk(file, fileId, i, total);
      log(`分片 ${i+1}/${total} 上传完成：${start}-${end}`);
    }
    setBar(65, '服务端合并文件中');
    log('所有分片已上传，调用 complete...');
    const complete = await completeUpload(file, fileId, language);
    setMeta('taskId', complete.task_id);
    setMeta('queuePos', String(complete.queue_position ?? '-'));
    log('complete 返回 task_id=' + complete.task_id);
    setBar(72, '后台任务已创建，开始轮询');
    startPolling(complete.task_id);
  } catch (err) {
    log('失败：' + err.message);
    $('result').innerHTML = `<span class="error">${err.message}</span>`;
    setBar(100, '失败');
  } finally {
    $('startBtn').disabled = false;
  }
});
$('resetBtn').addEventListener('click', resetUI);
resetUI();
</script>
</body>
</html>
